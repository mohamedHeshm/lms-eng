<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تغيير الباسورد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      max-width: 450px;
      width: 100%;
    }

    /* الخلفيات العائمة */
    .floating-bg {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 6s ease-in-out infinite;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: white;
      top: -100px;
      left: -100px;
      animation-delay: 0s;
    }

    .blob2 {
      width: 250px;
      height: 250px;
      background: white;
      bottom: -80px;
      right: -80px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(20px); }
    }

    /* البطاقة الرئيسية */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* الرأس */
    .header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease-out;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 15px;
      display: inline-block;
      animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      color: #999;
      font-size: 14px;
    }

    /* حقول الإدخال */
    .form-group {
      margin-bottom: 20px;
      animation: slideInLeft 0.6s ease-out;
      animation-fill-mode: both;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 45px 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    input[type="password"]:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }

    /* زرار الإظهار */
    .toggle-password {
      position: absolute;
      left: 12px;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s ease;
      color: #999;
      user-select: none;
    }

    .toggle-password:hover {
      color: #667eea;
      transform: scale(1.2);
    }

    /* رسالة الحالة */
    .status-message {
      min-height: 24px;
      margin-top: 15px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      animation: fadeIn 0.3s ease-out;
      opacity: 0;
    }

    .status-message.show {
      opacity: 1;
    }

    .status-message.success {
      background: rgba(37, 211, 102, 0.1);
      color: #25d366;
      border: 1px solid rgba(37, 211, 102, 0.3);
    }

    .status-message.error {
      background: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      border: 1px solid rgba(255, 77, 77, 0.3);
    }

    .status-message.info {
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
      border: 1px solid rgba(102, 126, 234, 0.3);
    }

    .status-message.warning {
      background: rgba(255, 193, 7, 0.1);
      color: #ffc107;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }

    /* الأزرار */
    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      animation: slideInRight 0.6s ease-out 0.4s;
      animation-fill-mode: both;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* زرار التحديث */
    .btn-update {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-update:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-update:active {
      transform: translateY(0);
    }

    .btn-update.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    /* زرار الرجوع */
    .btn-back {
      background: #f0f0f0;
      color: #333;
      transition: all 0.3s ease;
    }

    .btn-back:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    .btn-back:active {
      transform: translateY(0);
    }

    /* مؤشر التحميل */
    .spinner {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: white;
      margin-left: 6px;
      animation: blink 0.6s infinite;
    }

    @keyframes blink {
      0%, 20%, 50%, 80%, 100% { opacity: 1; }
      40% { opacity: 0.3; }
      60% { opacity: 0.3; }
    }

    /* شريط التقدم */
    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 25px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    /* اختبار قوة الباسورد */
    .password-strength {
      margin-top: 15px;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .password-strength.show {
      display: block;
    }

    .strength-bars {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      transition: background 0.3s ease;
    }

    .strength-text {
      font-size: 12px;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .strength-weak .strength-bar:nth-child(1) { background: #ff4d4d; }
    .strength-weak .strength-text { color: #ff4d4d; }

    .strength-medium .strength-bar:nth-child(-n+2) { background: #ffc107; }
    .strength-medium .strength-text { color: #ffc107; }

    .strength-strong .strength-bar { background: #25d366; }
    .strength-strong .strength-text { color: #25d366; }

    /* Responsive */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      input[type="password"],
      input[type="text"] {
        padding: 12px 40px 12px 14px;
        font-size: 14px;
      }

      button {
        padding: 12px;
        font-size: 14px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- الخلفيات العائمة -->
  <div class="floating-bg blob1"></div>
  <div class="floating-bg blob2"></div>

  <div class="container">
    <div class="card">
      <div class="header">
        <div class="icon">🔐</div>
        <h1>تغيير الباسورد</h1>
        <p>حدّث كلمة المرور الخاصة بك بأمان</p>
      </div>

      <form id="passwordForm" onsubmit="handleChangePassword(event)">
        <!-- الباسورد القديم -->
        <div class="form-group">
          <div class="input-wrapper">
            <input 
              type="password" 
              id="oldPassword" 
              placeholder="الباسورد القديم"
              required
            >
            <span class="toggle-password" onclick="togglePassword('oldPassword')">👁️</span>
          </div>
        </div>

        <!-- الباسورد الجديد -->
        <div class="form-group">
          <div class="input-wrapper">
            <input 
              type="password" 
              id="newPassword" 
              placeholder="الباسورد الجديد"
              oninput="checkPasswordStrength()"
              required
            >
            <span class="toggle-password" onclick="togglePassword('newPassword')">👁️</span>
          </div>

          <!-- اختبار قوة الباسورد -->
          <div id="strengthIndicator" class="password-strength">
            <div class="strength-bars">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <div class="strength-text"></div>
          </div>
        </div>

        <!-- تأكيد الباسورد -->
        <div class="form-group">
          <div class="input-wrapper">
            <input 
              type="password" 
              id="confirmPassword" 
              placeholder="تأكيد الباسورد الجديد"
              required
            >
            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
          </div>
        </div>

        <!-- رسالة الحالة -->
        <div id="statusMessage" class="status-message"></div>

        <!-- شريط التقدم -->
        <div class="progress-bar">
          <div class="progress-fill" id="progressBar"></div>
        </div>

        <!-- الأزرار -->
        <div class="button-group">
          <button type="submit" class="btn-update" id="submitBtn">
            تحديث الباسورد
          </button>
          <button type="button" class="btn-back" onclick="goBack()">
            رجوع
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
    const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
    const supabase = createClient(supabaseUrl, supabaseKey)

    // دالة الحصول على المستخدم الحالي
    function getCurrentUser() {
      try {
        const userJson = localStorage.getItem("currentUser")
        return userJson ? JSON.parse(userJson) : null
      } catch (e) {
        console.error("Error parsing user:", e)
        return null
      }
    }

    // تفعيل الحماية
    window.addEventListener('load', () => {
      const currentUser = getCurrentUser()
      if (!currentUser || currentUser.role !== 'student') {
        alert('❌ يجب تسجيل الدخول كطالب أولاً')
        window.location.href = 'index.html'
      }
    })

    // إظهار/إخفاء كلمة المرور
    window.togglePassword = function(fieldId) {
      const input = document.getElementById(fieldId)
      const icon = event.target
      
      if (input.type === 'password') {
        input.type = 'text'
        icon.textContent = '🙈'
      } else {
        input.type = 'password'
        icon.textContent = '👁️'
      }
    }

    // اختبار قوة كلمة المرور
    window.checkPasswordStrength = function() {
      const password = document.getElementById('newPassword').value
      const indicator = document.getElementById('strengthIndicator')
      const bars = indicator.querySelectorAll('.strength-bar')
      const text = indicator.querySelector('.strength-text')

      if (!password) {
        indicator.classList.remove('show')
        return
      }

      indicator.classList.add('show')

      let strength = 0
      
      if (password.length >= 6) strength++
      if (password.length >= 10) strength++
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++
      if (/[0-9]/.test(password)) strength++
      if (/[^a-zA-Z0-9]/.test(password)) strength++

      // تصفير الألوان
      indicator.classList.remove('strength-weak', 'strength-medium', 'strength-strong')

      if (strength <= 2) {
        indicator.classList.add('strength-weak')
        text.textContent = '⚠️ ضعيف جداً'
      } else if (strength <= 3) {
        indicator.classList.add('strength-medium')
        text.textContent = '⚠️ وسط'
      } else {
        indicator.classList.add('strength-strong')
        text.textContent = '✅ قوي جداً'
      }
    }

    // معالجة تغيير كلمة المرور
    window.handleChangePassword = async function(event) {
      event.preventDefault()

      const oldPassword = document.getElementById('oldPassword').value.trim()
      const newPassword = document.getElementById('newPassword').value.trim()
      const confirmPassword = document.getElementById('confirmPassword').value.trim()
      const statusMessage = document.getElementById('statusMessage')
      const submitBtn = document.getElementById('submitBtn')
      const progressBar = document.getElementById('progressBar')
      const currentUser = getCurrentUser()

      // إعادة تعيين الرسالة
      statusMessage.classList.remove('show', 'success', 'error', 'info', 'warning')
      
      // التحقق من البيانات
      if (!oldPassword || !newPassword || !confirmPassword) {
        showMessage('❌ يجب ملء جميع الحقول', 'error')
        return
      }

      if (oldPassword !== currentUser.password) {
        showMessage('❌ كلمة المرور القديمة غير صحيحة', 'error')
        return
      }

      if (newPassword !== confirmPassword) {
        showMessage('❌ كلمة المرور الجديدة غير متطابقة', 'error')
        return
      }

      if (newPassword === oldPassword) {
        showMessage('⚠️ كلمة المرور الجديدة مثل القديمة', 'warning')
        return
      }

      if (newPassword.length < 6) {
        showMessage('❌ كلمة المرور يجب أن تكون أطول من 5 أحرف', 'error')
        return
      }

      // بدء التحديث
      submitBtn.classList.add('loading')
      submitBtn.disabled = true
      showMessage('⏳ جاري تحديث كلمة المرور...', 'info')
      animateProgress(0, 60)

      try {
        // تحديث كلمة المرور في Supabase
        const { error } = await supabase
          .from('users')
          .update({ password: newPassword })
          .eq('id', currentUser.id)

        animateProgress(60, 100)

        if (error) {
          showMessage('❌ خطأ: ' + error.message, 'error')
          submitBtn.classList.remove('loading')
          submitBtn.disabled = false
          return
        }

        // تحديث البيانات المحفوظة محلياً
        currentUser.password = newPassword
        localStorage.setItem('currentUser', JSON.stringify(currentUser))

        // إظهار رسالة النجاح
        showMessage('✅ تم تحديث كلمة المرور بنجاح!', 'success')

        // تنظيف النموذج
        document.getElementById('passwordForm').reset()
        document.getElementById('strengthIndicator').classList.remove('show')

        // إعادة التوجيه بعد 2 ثانية
        setTimeout(() => {
          window.location.href = 'student.html'
        }, 2000)

      } catch (error) {
        console.error('Change password error:', error)
        showMessage('❌ خطأ: ' + error.message, 'error')
      } finally {
        submitBtn.classList.remove('loading')
        submitBtn.disabled = false
      }
    }

    // عرض الرسالة مع الرسوم المتحركة
    function showMessage(message, type) {
      const statusMessage = document.getElementById('statusMessage')
      statusMessage.textContent = message
      statusMessage.className = `status-message show ${type}`
      
      // إخفاء الرسالة بعد 5 ثوان
      setTimeout(() => {
        statusMessage.classList.remove('show')
      }, 5000)
    }

    // تحريك شريط التقدم
    function animateProgress(from, to) {
      const progressBar = document.getElementById('progressBar')
      const duration = 1000
      const startTime = Date.now()

      function animate() {
        const elapsed = Date.now() - startTime
        const progress = from + (to - from) * Math.min(elapsed / duration, 1)
        progressBar.style.width = progress + '%'

        if (progress < to) {
          requestAnimationFrame(animate)
        }
      }

      animate()
    }

    // الرجوع للصفحة السابقة
    window.goBack = function() {
      window.history.back()
    }
  </script>

</body>
</html>
