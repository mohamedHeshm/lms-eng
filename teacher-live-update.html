<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Teacher Dashboard - متجاوب بالكامل</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
    }

    .menu-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 1000;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      display: none;
      transition: all 0.3s ease;
    }

    .menu-toggle:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    }

    /* ==================== LIVE VIDEO MODAL ==================== */
    .live-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 2000;
      overflow-y: auto;
      padding: 20px;
    }

    .live-modal.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .live-container {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .live-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .live-header h2 {
      color: #667eea;
      font-size: 28px;
    }

    .close-live-btn {
      background: #ff5252;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
    }

    .close-live-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(255, 82, 82, 0.3);
    }

    .live-video-area {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    #local-video-container {
      width: 100%;
      height: 400px;
      background: #000;
      border-radius: 15px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
    }

    #remote-video-container {
      width: 100%;
      height: 400px;
      background: #1a1a1a;
      border-radius: 15px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .participant-video {
      width: 100%;
      height: 80px;
      background: #000;
      border-radius: 10px;
      overflow: hidden;
    }

    .live-controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .control-btn {
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    #mic-btn {
      background: #25d366;
      color: white;
    }

    #camera-btn {
      background: #4facfe;
      color: white;
    }

    #screen-btn {
      background: #667eea;
      color: white;
    }

    .control-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .control-btn:active {
      transform: translateY(-1px);
    }

    /* ==================== SETUP FORM ==================== */
    .live-setup {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .setup-section {
      background: #f5f7ff;
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #e0e8ff;
    }

    .setup-section h3 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .setup-section label {
      display: block;
      margin: 12px 0 5px 0;
      color: #333;
      font-weight: 600;
    }

    .setup-section select,
    .setup-section input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
    }

    .setup-section select:focus,
    .setup-section input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .students-list {
      max-height: 200px;
      overflow-y: auto;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px;
      background: white;
    }

    .student-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin: 5px 0;
      background: #f0f4ff;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .student-item:hover {
      background: #e0e8ff;
    }

    .student-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .student-item label {
      margin: 0;
      cursor: pointer;
      flex: 1;
    }

    /* ==================== PARTICIPANT INFO ==================== */
    .participant-info {
      background: #f5f7ff;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .participant-info h4 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .participant-info p {
      margin: 5px 0;
      color: #666;
      font-size: 14px;
    }

    /* ==================== START BUTTON ==================== */
    .start-live-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #25d366 0%, #128c45 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.3);
    }

    .start-live-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(37, 211, 102, 0.4);
    }

    .start-live-btn:active {
      transform: translateY(-1px);
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 900px) {
      .live-setup {
        grid-template-columns: 1fr;
      }

      .live-video-area {
        grid-template-columns: 1fr;
      }

      .live-controls {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .live-container {
        padding: 15px;
      }

      .live-video-area {
        gap: 10px;
      }

      #local-video-container,
      #remote-video-container {
        height: 250px;
      }

      .live-controls {
        grid-template-columns: 1fr;
      }

      .live-header h2 {
        font-size: 20px;
      }
    }

    /* Status Info */
    .status-info {
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      border: 2px solid #4caf50;
      color: #2e7d32;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 600;
    }

    #participant-count {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      margin: 0 10px;
    }
  </style>
</head>
<body>

<!-- Live Video Modal -->
<div id="liveModal" class="live-modal">
  <div class="live-container">
    <!-- Header -->
    <div class="live-header">
      <h2>📹 جلسة الفيديو المباشرة</h2>
      <button class="close-live-btn" onclick="closeLiveModal()">❌ إغلاق الجلسة</button>
    </div>

    <!-- Setup Form (will show before starting) -->
    <div id="liveSetupForm">
      <div class="live-setup">
        <!-- Stage Selection -->
        <div class="setup-section">
          <h3>🎓 اختر المرحلة الدراسية</h3>
          <select id="stageSelect" onchange="loadStageStudents()">
            <option value="">-- اختر المرحلة --</option>
            <option value="primary">المرحلة الابتدائية</option>
            <option value="middle">المرحلة الإعدادية</option>
            <option value="secondary">المرحلة الثانوية</option>
          </select>
        </div>

        <!-- Student Selection -->
        <div class="setup-section">
          <h3>👥 اختر الطلاب</h3>
          <label>
            <input type="checkbox" id="selectAllStudents" onchange="toggleAllStudents()">
            اختر جميع الطلاب
          </label>
          <div class="students-list" id="studentsList">
            <p style="color:#999; text-align:center;">👈 اختر مرحلة أولاً</p>
          </div>
        </div>
      </div>

      <button class="start-live-btn" onclick="startLive()">🎬 بدء الجلسة المباشرة</button>
    </div>

    <!-- Live Controls (hidden until session starts) -->
    <div id="liveSessionArea" style="display:none;">
      <div class="status-info">
        🟢 الجلسة مستمرة | <span id="participant-count">0 متصل</span>
      </div>

      <!-- Video Area -->
      <div class="live-video-area">
        <div id="local-video-container">
          📹 انتظر تحميل الكاميرا...
        </div>
        <div id="remote-video-container">
          <p style="color:white; text-align:center; padding:20px;">👥 الطلاب المتصلين</p>
        </div>
      </div>

      <!-- Controls -->
      <div class="live-controls">
        <button id="mic-btn" class="control-btn" onclick="toggleMicrophone()">🎤 فتح الميكروفون</button>
        <button id="camera-btn" class="control-btn" onclick="toggleCamera()">📷 فتح الكاميرا</button>
        <button id="screen-btn" class="control-btn" onclick="toggleScreenShare()">🖥️ مشاركة الشاشة</button>
      </div>

      <!-- Participant Info -->
      <div class="participant-info">
        <h4>👥 معلومات الجلسة</h4>
        <p>🎓 المرحلة: <strong id="sessionStage">-</strong></p>
        <p>👥 عدد الطلاب المختارين: <strong id="selectedStudentCount">0</strong></p>
        <p>🔗 رابط الجلسة: <strong id="sessionChannelName">-</strong></p>
      </div>
    </div>
  </div>
</div>

<!-- Quick Access Button (in main page) -->
<button id="openLiveBtn" style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg, #667eea, #764ba2); color:white; border:none; font-size:28px; cursor:pointer; box-shadow:0 5px 20px rgba(0,0,0,0.3); z-index:100; transition:all 0.3s ease;" 
        onclick="openLiveModal()" 
        title="بدء جلسة فيديو مباشرة">
  📹
</button>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
<script src="js/live-video-module.js"></script>
<script type="module" src="js/app.js"></script>

<script>
// Initialize on page load
document.addEventListener('DOMContentLoaded', async function() {
  await window.initLiveModule();
});

// Open Live Modal
function openLiveModal() {
  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'teacher') {
    alert('❌ هذه الميزة للمدرسين فقط');
    return;
  }
  
  document.getElementById('liveModal').classList.add('active');
  document.getElementById('liveSetupForm').style.display = 'block';
  document.getElementById('liveSessionArea').style.display = 'none';
}

// Close Live Modal
function closeLiveModal() {
  if (confirm('هل متأكد من إيقاف الجلسة؟')) {
    window.leaveLiveChannel().then(() => {
      document.getElementById('liveModal').classList.remove('active');
    });
  }
}

// Load Students for Selected Stage
function loadStageStudents() {
  const stage = document.getElementById('stageSelect').value;
  if (!stage) {
    document.getElementById('studentsList').innerHTML = '<p style="color:#999; text-align:center;">👈 اختر مرحلة</p>';
    return;
  }

  // Mock data - replace with real data from database
  const stageStudents = {
    primary: [
      { id: 1, name: 'أحمد محمد' },
      { id: 2, name: 'فاطمة علي' },
      { id: 3, name: 'محمود سالم' }
    ],
    middle: [
      { id: 4, name: 'سارة خالد' },
      { id: 5, name: 'عمر ياسين' },
      { id: 6, name: 'ليلى حسن' }
    ],
    secondary: [
      { id: 7, name: 'زيد عبدالله' },
      { id: 8, name: 'نور محمد' },
      { id: 9, name: 'علي أحمد' }
    ]
  };

  const students = stageStudents[stage] || [];
  let html = '';
  
  students.forEach(student => {
    html += `
      <div class="student-item">
        <input type="checkbox" class="student-checkbox" value="${student.id}" onchange="updateSelectedCount()">
        <label>${student.name}</label>
      </div>
    `;
  });

  document.getElementById('studentsList').innerHTML = html;
  updateSelectedCount();
}

// Toggle All Students
function toggleAllStudents() {
  const checkboxes = document.querySelectorAll('.student-checkbox');
  const selectAll = document.getElementById('selectAllStudents').checked;
  checkboxes.forEach(cb => cb.checked = selectAll);
  updateSelectedCount();
}

// Update Selected Count
function updateSelectedCount() {
  const checkboxes = document.querySelectorAll('.student-checkbox:checked');
  document.getElementById('selectedStudentCount').innerText = checkboxes.length;
}

// Start Live Session
async function startLive() {
  const stage = document.getElementById('stageSelect').value;
  const checkboxes = document.querySelectorAll('.student-checkbox:checked');
  
  if (!stage || checkboxes.length === 0) {
    alert('⚠️ اختر مرحلة وطلاب');
    return;
  }

  const currentUser = JSON.parse(localStorage.getItem('currentUser'));
  const channelName = `teacher-${currentUser.id}-${Date.now()}`;
  
  // Join the live channel
  const joined = await window.joinLiveChannel(channelName, currentUser.id, 'broadcaster');
  
  if (joined) {
    // Hide setup form and show live session
    document.getElementById('liveSetupForm').style.display = 'none';
    document.getElementById('liveSessionArea').style.display = 'block';
    document.getElementById('sessionStage').innerText = document.getElementById('stageSelect').options[document.getElementById('stageSelect').selectedIndex].text;
    document.getElementById('sessionChannelName').innerText = channelName;
    
    // Store selected students in session
    window.liveSessionState.selectedStudents = Array.from(checkboxes).map(cb => cb.value);
    window.liveSessionState.selectedStage = stage;
  }
}

// Notify Participants
window.notifySelectedStudents = function() {
  // Send notification to selected students
  const students = window.liveSessionState.selectedStudents;
  const channelName = window.liveSessionState.channelName;
  
  // You can implement this by:
  // 1. Storing notification in database
  // 2. Using WebSocket for real-time notification
  // 3. Using browser notifications API
  
  console.log('📢 Notifying students:', students);
  alert(`📢 تم إرسال إشعارات لـ ${students.length} طالب`);
};
</script>

</body>
</html>
