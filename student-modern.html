<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; }
    .container { width: 95%; max-width: 1200px; margin: auto; padding: 20px; }
    
    /* Header */
    .header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    .header h2 { margin: 0 0 10px 0; color: #333; text-align: center; }
    .student-info { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; text-align: center; }
    .student-info p { margin: 5px 0; }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tabs button { flex: 1; min-width: 120px; padding: 12px; background: white; border: 2px solid #667eea; color: #667eea; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 600; transition: all 0.3s; }
    .tabs button:hover { background: #667eea; color: white; }
    .tabs button.active { background: #667eea; color: white; }
    
    .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* قائمة المحتوى */
    .content-list { list-style: none; padding: 0; margin: 0; }
    .content-item { background: #f5f7ff; padding: 15px; margin: 10px 0; border-radius: 10px; border-right: 4px solid #667eea; display: flex; align-items: center; justify-content: space-between; }
    .content-item a { color: #667eea; text-decoration: none; flex: 1; margin: 0 10px; }
    .content-item a:hover { text-decoration: underline; }
    
    /* البروفايل */
    .profile-card { text-align: center; }
    .profile-image { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #667eea; margin: 0 auto 15px; }
    .profile-card h4 { color: #333; margin: 10px 0; }
    .profile-card p { color: #666; margin: 5px 0; }
    
    .teacher-social { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .social-btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; font-family: 'Cairo', sans-serif; transition: all 0.3s; }
    .social-btn:hover { transform: translateY(-2px); }
    
    .empty-state { text-align: center; padding: 30px; color: #999; }
    
    /* فيديو */
    iframe { border-radius: 10px; border: 2px solid #667eea; }
    
    /* زر الخروج */
    .logout { background: #ff4d4d; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-family: 'Cairo', sans-serif; font-weight: 600; transition: all 0.3s; }
    .logout:hover { background: #cc0000; }
    
    /* شريط التمرير */
    .scroll-btn { position: fixed; width: 50px; height: 50px; border-radius: 50%; background: #667eea; color: white; border: none; cursor: pointer; display: none; z-index: 100; transition: all 0.3s; }
    .scroll-btn:hover { background: #764ba2; transform: scale(1.1); }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h2>👨‍🎓 لوحة الطالب</h2>
    <div class="student-info" id="studentInfo">
      <p><strong>👤 الطالب:</strong> <span id="studentName">...</span></p>
      <p><strong>📚 السنة:</strong> <span id="studentYear">...</span></p>
      <p><strong>👨‍🏫 المدرس:</strong> <span id="teacherName">...</span></p>
    </div>
  </div>

  <!-- التنقل -->
  <div class="tabs" id="navTabs">
    <button class="tab-btn active" onclick="openStudentTab('profile')">👤 البروفايل</button>
    <button class="tab-btn" onclick="openStudentTab('videos')">🎥 الفيديوهات</button>
    <button class="tab-btn" onclick="openStudentTab('sheets')">📄 الشيتات</button>
    <button class="tab-btn" onclick="openStudentTab('notes')">📚 المذكرات</button>
    <button class="tab-btn" onclick="openStudentTab('announcements')">📝 الملاحظات</button>
  </div>

  <!-- البروفايل والمدرس -->
  <div id="profile" class="tab-content active">
    <div class="card">
      <h3>👤 بروفايل المدرس</h3>
      <div class="profile-card">
        <div id="teacherProfile">
          <p class="empty-state">جاري التحميل...</p>
        </div>
        <div id="teacherSocial" class="teacher-social"></div>
      </div>
    </div>

    <!-- رفع الحل -->
    <div class="card">
      <h3>📤 رفع حلك</h3>
      <input type="file" id="solutionFile" accept=".pdf,.doc,.docx,.jpg,.png,.txt">
      <button onclick="uploadSolution()" style="background:#25d366; color:white; padding:10px; border:none; border-radius:8px; cursor:pointer; margin-top:10px; width:100%; font-family:'Cairo', sans-serif;">📤 رفع</button>
      <p id="uploadStatus" style="text-align:center; margin-top:10px; font-weight:600;"></p>
    </div>
  </div>

  <!-- الفيديوهات -->
  <div id="videos" class="tab-content">
    <div class="card">
      <h3>🎥 الفيديوهات</h3>
      <div id="videoContainer">
        <p class="empty-state">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <!-- الشيتات -->
  <div id="sheets" class="tab-content">
    <div class="card">
      <h3>📄 الشيتات</h3>
      <ul class="content-list" id="pdfList">
        <li class="empty-state">جاري التحميل...</li>
      </ul>
    </div>
  </div>

  <!-- المذكرات -->
  <div id="notes" class="tab-content">
    <div class="card">
      <h3>📚 المذكرات</h3>
      <ul class="content-list" id="pdfList2">
        <li class="empty-state">جاري التحميل...</li>
      </ul>
    </div>
  </div>

  <!-- الملاحظات -->
  <div id="announcements" class="tab-content">
    <div class="card">
      <h3>📝 الملاحظات المهمة</h3>
      <ul class="content-list" id="noteList">
        <li class="empty-state">جاري التحميل...</li>
      </ul>
    </div>
  </div>

  <!-- الخروج -->
  <button class="logout" onclick="logout()">🚪 تسجيل خروج</button>
</div>

<!-- أزرار التمرير -->
<button id="scrollTopBtn" class="scroll-btn" onclick="scrollToTop()" style="bottom:100px; right:20px;">⬆</button>
<button id="scrollBottomBtn" class="scroll-btn" onclick="scrollToBottom()" style="bottom:30px; right:20px;">⬇</button>

<script type="module" src="js/app.js"></script>

<script>
  // إدارة التنقل
  window.openStudentTab = function(tabName) {
    // إخفاء جميع التبويبات
    document.querySelectorAll('.tab-content').forEach(tab => {
      tab.classList.remove('active');
    });
    
    // إزالة active من جميع الأزرار
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    
    // عرض التبويب المختار
    let selectedTab = document.getElementById(tabName);
    if (selectedTab) {
      selectedTab.classList.add('active');
    }
    
    // إضافة active للزر المختار
    event.target.classList.add('active');
  };

  // التمرير
  window.scrollToTop = function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.scrollToBottom = function() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  };

  // عرض/إخفاء أزرار التمرير
  window.addEventListener('scroll', function() {
    let topBtn = document.getElementById('scrollTopBtn');
    let bottomBtn = document.getElementById('scrollBottomBtn');
    if (window.scrollY > 300) {
      topBtn.style.display = 'block';
    } else {
      topBtn.style.display = 'none';
    }
    if (window.scrollY < document.body.scrollHeight - window.innerHeight - 300) {
      bottomBtn.style.display = 'block';
    } else {
      bottomBtn.style.display = 'none';
    }
  });
</script>

</body>
</html>
