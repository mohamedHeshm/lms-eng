<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>LMS Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<div class="login-container">

  <div class="login-box-pro">

    <h2>🎓 Al-Ma'moun 🎓</h2>
    <p>تسجيل الدخول</p>

    <!-- Email -->
    <div class="input-group">
      <input type="email" id="email" required>
      <label>📧 الايميل</label>
    </div>

    <!-- Password -->
    <div class="input-group">
      <input type="password" id="password" required>
      <label>🔒 الباسورد</label>
    </div>

    <!-- زر الدخول -->
    <button onclick="handleLogin()" id="loginBtn">دخول</button>

    <!-- حالة تسجيل الدخول -->
    <p id="loginStatus" style="text-align:center; margin-top:10px; color:#ff4d4d;"></p>

    <div class="footer-text">
      ✨ Developer by Mohamed Hesham ✨
    </div>

  </div>

</div>

<!-- Scroll -->
<button id="scrollTopBtn" onclick="scrollToTop()">⬆</button>
<button id="scrollBottomBtn" onclick="scrollToBottom()">⬇</button>

<script type="module" src="js/app.js"></script>

<script>
  // 🔥 تحسين تجربة تسجيل الدخول
  async function handleLogin() {
    let btn = document.getElementById("loginBtn")
    let status = document.getElementById("loginStatus")

    btn.disabled = true
    btn.innerText = "⏳ جاري..."
    status.innerText = ""

    try {
      await window.login()
    } catch (e) {
      status.innerText = "❌ حصل خطأ: " + e.message
    }

    btn.disabled = false
    btn.innerText = "دخول"
  }

  // 🔥 Enter للدخول
  document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      handleLogin()
    }
  })
</script>

</body>
</html>
