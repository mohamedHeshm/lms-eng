<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🎓 Al-Ma'moun | تسجيل الدخول - منصة التعليم الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: #0b0c1a;
      /* خلفية متدرجة ديناميكية ناعمة مع تموج محسن */
      background: radial-gradient(circle at 10% 20%, rgba(15, 25, 55, 1) 0%, rgba(8, 12, 28, 0.95) 100%);
      color: #ffffff;
      position: relative;
      overflow-x: hidden;
    }

    /* خلفية رئيسية متطورة: شبكة تعليمية + حبيبات ضبابية + أنيميشن ذكي */
    .smart-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    /* طبقة الشبكة الهندسية (مستوحاة من التكنولوجيا والتعليم) */
    .grid-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(102, 126, 234, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102, 126, 234, 0.08) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridShift 25s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* أضواء خلفية ناعمة متحركة (أوراق تعليمية) */
    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      animation: floatGlow 18s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes floatGlow {
      0% { transform: translate(0, 0) scale(1); opacity: 0.25; }
      100% { transform: translate(40px, -40px) scale(1.2); opacity: 0.45; }
    }

    .orb1 { width: 400px; height: 400px; background: #4a3b9e; top: -150px; left: -100px; animation-duration: 20s; }
    .orb2 { width: 500px; height: 500px; background: #1e4a76; bottom: -200px; right: -150px; animation-duration: 25s; animation-direction: alternate-reverse; }
    .orb3 { width: 300px; height: 300px; background: #8b5cf6; top: 40%; left: 65%; animation-duration: 17s; opacity: 0.2; }
    .orb4 { width: 350px; height: 350px; background: #c084fc; bottom: 15%; left: 5%; animation-duration: 22s; }

    /* عناصر تعليمية عائمة محسنة (أيقونات ذكية) */
    .float-item {
      position: absolute;
      font-size: 2.2rem;
      opacity: 0.2;
      animation: floatSmart 14s infinite alternate;
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.2));
      pointer-events: none;
      transition: opacity 0.3s;
    }

    @keyframes floatSmart {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-35px) rotate(6deg); }
    }

    .float-item:nth-child(1) { top: 12%; left: 3%; font-size: 2.8rem; animation-duration: 12s; opacity: 0.25; }
    .float-item:nth-child(2) { top: 22%; right: 4%; font-size: 2rem; animation-duration: 15s; animation-delay: 1s; opacity: 0.2; }
    .float-item:nth-child(3) { bottom: 18%; left: 6%; font-size: 3rem; animation-duration: 18s; opacity: 0.2; }
    .float-item:nth-child(4) { bottom: 28%; right: 8%; font-size: 2.3rem; animation-duration: 13s; animation-delay: 2s; }
    .float-item:nth-child(5) { top: 45%; left: 2%; font-size: 2.5rem; animation-duration: 16s; opacity: 0.2; }
    .float-item:nth-child(6) { top: 70%; right: 3%; font-size: 2rem; animation-duration: 19s; }
    .float-item:nth-child(7) { top: 85%; left: 15%; font-size: 2.6rem; animation-duration: 11s; opacity: 0.2; }
    .float-item:nth-child(8) { top: 8%; left: 20%; font-size: 2rem; animation-duration: 14s; opacity: 0.2; }
    .float-item:nth-child(9) { bottom: 8%; right: 20%; font-size: 2.7rem; animation-duration: 17s; }

    /* موجة سفلي محسنة (طبقة رقيقة) */
    .wave-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 110px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(102,126,234,0.12)" fill-opacity="0.6" d="M0,224L48,213.3C96,203,192,181,288,176C384,171,480,181,576,197.3C672,213,768,235,864,234.7C960,235,1056,213,1152,197.3C1248,181,1344,171,1392,165.3L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
      background-size: cover;
      animation: gentleWave 12s linear infinite;
      pointer-events: none;
      opacity: 0.7;
    }

    @keyframes gentleWave {
      0% { background-position-x: 0; }
      100% { background-position-x: 1440px; }
    }

    /* الحاوية الرئيسية */
    .login-wrapper {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* الكارت الرئيسي - زجاجي محسن مع إضاءة خفيفة */
    .login-card {
      width: 100%;
      max-width: 500px;
      background: rgba(12, 18, 34, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 56px;
      border: 1px solid rgba(102, 126, 234, 0.35);
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(102, 126, 234, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.35s ease, box-shadow 0.4s ease;
      animation: cardRise 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes cardRise {
      0% { opacity: 0; transform: translateY(40px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 35px 70px -15px rgba(102, 126, 234, 0.45);
      border-color: rgba(102, 126, 234, 0.6);
    }

    .card-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(95deg, #667eea, #b794f4, #f093fb, #667eea);
      background-size: 250% 100%;
      border-radius: 56px 56px 0 0;
      animation: shimmerAccent 4s ease infinite;
    }

    @keyframes shimmerAccent {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card-content {
      padding: 48px 42px;
    }

    /* الشعار والهوية البصرية */
    .logo-section {
      text-align: center;
      margin-bottom: 34px;
    }

    .logo-icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, #2d2f5e, #1b1c3a);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
      animation: gentlePulse 3s infinite ease;
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); box-shadow: 0 20px 30px -8px rgba(0, 0, 0, 0.4); }
      50% { transform: scale(1.02); box-shadow: 0 25px 40px -10px rgba(102, 126, 234, 0.4); }
    }

    .logo-section h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #c3b9ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }

    .logo-section p {
      color: #a0aec0;
      font-size: 0.9rem;
      font-weight: 400;
      margin-top: 5px;
    }

    /* حقول الإدخال بتصميم حديث */
    .input-field {
      margin-bottom: 1.6rem;
      position: relative;
    }

    .input-field input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      background: rgba(20, 27, 45, 0.7);
      border: 1.5px solid rgba(102, 126, 234, 0.25);
      border-radius: 28px;
      color: #f1f5f9;
      font-size: 1rem;
      font-family: 'Cairo', sans-serif;
      transition: all 0.25s;
      outline: none;
      font-weight: 500;
    }

    .input-field input:focus {
      border-color: #8b5cf6;
      background: rgba(30, 41, 70, 0.8);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }

    .input-field input::placeholder {
      color: rgba(160, 174, 192, 0.6);
      font-weight: 400;
    }

    .input-icon {
      position: absolute;
      right: 1.1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.25rem;
      opacity: 0.65;
      transition: 0.2s;
      pointer-events: none;
    }

    .input-field input:focus ~ .input-icon {
      opacity: 1;
      color: #a78bfa;
      transform: translateY(-50%) scale(1.05);
    }

    /* مجموعة الأزرار */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 32px;
    }

    .btn {
      padding: 14px 22px;
      border: none;
      border-radius: 44px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.5s, height 0.5s;
    }

    .btn:active::after {
      width: 200px;
      height: 200px;
    }

    .btn-primary {
      background: linear-gradient(105deg, #5e6fe0, #8b5cf6, #c084fc);
      background-size: 200% auto;
      color: white;
      box-shadow: 0 10px 18px -6px rgba(91, 87, 189, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 16px 28px -8px rgba(139, 92, 246, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1.2px solid rgba(139, 92, 246, 0.4);
      color: #e2e8f0;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(139, 92, 246, 0.2);
      border-color: #a78bfa;
      transform: translateY(-2px);
    }

    .btn-demo {
      background: rgba(0, 0, 0, 0.2);
      border: 1px dashed rgba(167, 139, 250, 0.6);
      color: #cbd5e1;
      font-size: 0.85rem;
    }

    .btn-demo:hover:not(:disabled) {
      background: rgba(139, 92, 246, 0.15);
      border-color: #c084fc;
      color: #ddd6fe;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .btn-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* رسائل الحالة */
    .status-message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 28px;
      font-weight: 500;
      font-size: 0.9rem;
      text-align: center;
      backdrop-filter: blur(4px);
      animation: fadeSlide 0.2s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      color: #6ee7b7;
    }

    .status-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .status-info {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.4);
      color: #c4b5fd;
    }

    .extra-links {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .extra-links a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 0.8rem;
      transition: 0.2s;
      font-weight: 500;
    }

    .extra-links a:hover {
      color: #a78bfa;
      text-decoration: underline;
    }

    .footer-text {
      text-align: center;
      margin-top: 26px;
      font-size: 0.7rem;
      color: #6b7280;
      letter-spacing: 0.3px;
    }

    @media (max-width: 550px) {
      .card-content { padding: 32px 24px; }
      .logo-icon { width: 70px; height: 70px; font-size: 42px; }
      .logo-section h1 { font-size: 1.8rem; }
      .btn-group { gap: 12px; }
      .input-field input { padding: 0.9rem 1rem 0.9rem 2.6rem; }
      .float-item { font-size: 1.8rem; opacity: 0.15; }
    }
  </style>
</head>
<body>

<div class="smart-bg">
  <div class="grid-pattern"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>
  <div class="glow-orb orb3"></div>
  <div class="glow-orb orb4"></div>
  <!-- أيقونات تعليمية عائمة متنوعة -->
  <div class="float-item">📚</div>
  <div class="float-item">✏️</div>
  <div class="float-item">🧠</div>
  <div class="float-item">🎓</div>
  <div class="float-item">💡</div>
  <div class="float-item">📖</div>
  <div class="float-item">⚛️</div>
  <div class="float-item">🔬</div>
  <div class="float-item">📊</div>
  <div class="wave-footer"></div>
</div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-accent"></div>
    <div class="card-content">
      <div class="logo-section">
        <div class="logo-icon">🎓</div>
        <h1>Al-Ma'moun</h1>
        <p>منصة التعليم الذكية • نحو مستقبل معرفي</p>
      </div>

      <div class="input-field">
        <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email" aria-label="البريد الإلكتروني">
        <span class="input-icon">📧</span>
      </div>

      <div class="input-field">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" aria-label="كلمة المرور">
        <span class="input-icon">🔒</span>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="loginBtn"><span>✨ تسجيل الدخول</span></button>
        <button class="btn btn-secondary" id="backBtn"><span>🏠 الصفحة الرئيسية</span></button>
        <button class="btn btn-demo" id="demoHintBtn"><span>🔐 بيانات تجريبية للدخول</span></button>
      </div>

      <div id="loginStatus"></div>

      <div class="extra-links">
        <a href="#" aria-label="مساعدة">❓ مساعدة</a>
        <a href="https://wa.me/qr/FMXMGJVKOCLME1" target="_blank" aria-label="تواصل مع الدعم">📞 تواصل مع الدعم</a>
      </div>

      <div class="footer-text">Developed by Eng Mohamed Hesham 👨🏻‍💻</div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
  const supabase = createClient(supabaseUrl, supabaseKey)

  const elements = {
    email: document.getElementById('email'),
    password: document.getElementById('password'),
    loginBtn: document.getElementById('loginBtn'),
    backBtn: document.getElementById('backBtn'),
    demoHintBtn: document.getElementById('demoHintBtn'),
    statusDiv: document.getElementById('loginStatus')
  }

  function showStatus(message, type = 'info') {
    if (elements.statusDiv) {
      const icon = type === 'success' ? '✅' : type === 'error' ? '⚠️' : 'ℹ️'
      elements.statusDiv.innerHTML = `<div class="status-message status-${type}">${icon} ${message}</div>`
    }
  }

  function hideStatus() { if (elements.statusDiv) elements.statusDiv.innerHTML = ''; }

  function setButtonsEnabled(enabled) {
    const btns = [elements.loginBtn, elements.backBtn, elements.demoHintBtn]
    btns.forEach(btn => { if (btn) btn.disabled = !enabled })
  }

  function setLoginLoading(isLoading) {
    if (elements.loginBtn) {
      elements.loginBtn.innerHTML = isLoading ? '<span class="btn-spinner"></span><span> جاري التحقق...</span>' : '<span>✨ تسجيل الدخول</span>'
    }
  }

  function setBackLoading(isLoading) {
    if (elements.backBtn) {
      elements.backBtn.innerHTML = isLoading ? '<span class="btn-spinner"></span><span> جاري...</span>' : '<span>🏠 الصفحة الرئيسية</span>'
    }
  }

  function showDemoCredentials() {
    if (elements.email && elements.password) {
      elements.email.value = 'student@test.com'
      elements.password.value = '123456'
      showStatus('📝 تم تعبئة بيانات تجريبية (student@test.com / 123456). يمكنك الدخول مباشرة.', 'info')
      setTimeout(() => hideStatus(), 3500)
    }
  }

  async function handleLogin() {
    const email = elements.email?.value.trim()
    const password = elements.password?.value.trim()

    if (!email || !password) {
      showStatus('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error')
      return
    }
    if (!email.includes('@') || !email.includes('.')) {
      showStatus('صيغة البريد الإلكتروني غير صحيحة', 'error')
      return
    }

    setButtonsEnabled(false)
    setLoginLoading(true)
    showStatus('جاري التحقق من البيانات مع قاعدة البيانات ...', 'info')

    try {
      const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("email", email)
        .eq("password", password)
        .maybeSingle()

      if (error || !data) {
        showStatus('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error')
        setButtonsEnabled(true)
        setLoginLoading(false)
        return
      }

      if (data.is_active === false) {
        showStatus('⚠️ هذا الحساب معطل، يرجى التواصل مع الإدارة.', 'error')
        setButtonsEnabled(true)
        setLoginLoading(false)
        return
      }

      // نجاح الدخول
      showStatus(`مرحباً ${data.name || data.email}! تم التحقق بنجاح، جاري التوجيه...`, 'success')
      localStorage.setItem("currentUser", JSON.stringify(data))

      // تسجيل دخول (غير متزامن بدون تأثير على الأداء)
      try {
        await supabase.from("login_logs").insert([{
          user_id: data.id,
          user_name: data.name,
          user_email: data.email,
          user_role: data.role,
          login_time: new Date().toISOString()
        }])
      } catch (logErr) { console.warn("Log save non-critical:", logErr) }

      const redirectPlaylistId = localStorage.getItem('redirectAfterLogin')
      if (redirectPlaylistId) {
        localStorage.removeItem('redirectAfterLogin')
        setTimeout(() => { window.location.href = `playlist-view.html?id=${redirectPlaylistId}` }, 900)
        return
      }

      setTimeout(() => {
        if (data.role === "admin") window.location.href = "admin.html"
        else if (data.role === "teacher") window.location.href = "teacher.html"
        else if (data.role === "student") window.location.href = "student-modern.html"
        else window.location.href = "dashboard-home.html"
      }, 900)

    } catch (err) {
      console.error("Login network error:", err)
      showStatus('حدث خطأ في الاتصال بالسيرفر. تحقق من اتصالك بالإنترنت', 'error')
      setButtonsEnabled(true)
      setLoginLoading(false)
    }
  }

  function goBack() {
    setBackLoading(true)
    setButtonsEnabled(false)
    window.location.href = "dashboard-home.html"
  }

  // روابط Enter
  function setupEnterHandler() {
    const inputs = [elements.email, elements.password]
    inputs.forEach(input => {
      if (input) {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault()
            handleLogin()
          }
        })
      }
    })
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (elements.loginBtn) elements.loginBtn.onclick = (e) => { e.preventDefault(); handleLogin() }
    if (elements.backBtn) elements.backBtn.onclick = (e) => { e.preventDefault(); goBack() }
    if (elements.demoHintBtn) elements.demoHintBtn.onclick = (e) => { e.preventDefault(); showDemoCredentials() }
    setupEnterHandler()
  })

  // منع أي تداخل غير متوقع
  window.handleLogin = handleLogin
