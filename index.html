<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 Al-Ma'moun • تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0a1a 0%, #0f0f2a 50%, #1a0f2a 100%);
      color: #fff;
    }

    /* ============ خلفية متحركة حديثة ============ */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .gradient-bg {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at 30% 40%, rgba(102,126,234,0.4) 0%, rgba(118,75,162,0.3) 30%, rgba(240,147,251,0.1) 60%, transparent 80%);
      animation: rotateGradient 20s ease infinite;
    }

    @keyframes rotateGradient {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(102,126,234,0.15)" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,208C960,213,1056,203,1152,186.7C1248,171,1344,149,1392,138.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
      background-size: cover;
      animation: waveMove 15s linear infinite;
    }

    @keyframes waveMove {
      0% { background-position-x: 0; }
      100% { background-position-x: 1440px; }
    }

    /* جزيئات متحركة */
    .particle {
      position: absolute;
      background: linear-gradient(135deg, #667eea, #f093fb);
      border-radius: 50%;
      opacity: 0.6;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      from { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      to { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }

    /* ============ الحاوية الرئيسية ============ */
    .login-wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ============ الكارت الرئيسي - تصميم جديد ============ */
    .login-card {
      position: relative;
      width: 100%;
      max-width: 480px;
      background: rgba(15, 20, 45, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(102, 126, 234, 0.3);
      box-shadow:
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(102, 126, 234, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardFloat 0.8s ease-out;
    }

    @keyframes cardFloat {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-card:hover {
      transform: translateY(-5px);
      box-shadow:
        0 35px 60px -15px rgba(102, 126, 234, 0.4),
        0 0 0 1px rgba(102, 126, 234, 0.2);
    }

    /* شريط علوي ملون */
    .card-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 300% 100%;
      animation: accentMove 3s ease infinite;
    }

    @keyframes accentMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* محتوى الكارت */
    .card-content {
      padding: 48px 40px;
    }

    /* ============ الشعار ============ */
    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3);
      transition: all 0.4s ease;
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 15px 35px rgba(102, 126, 234, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 25px 45px rgba(102, 126, 234, 0.5); }
    }

    .logo-section h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #667eea, #f093fb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .logo-section p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
    }

    /* ============ حقول الإدخال - تصميم جديد ============ */
    .input-field {
      margin-bottom: 24px;
      position: relative;
    }

    .input-field input {
      width: 100%;
      padding: 16px 52px 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      color: #fff;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field input:focus {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    .input-field input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      opacity: 0.5;
      transition: 0.3s;
    }

    .input-field input:focus ~ .input-icon {
      opacity: 1;
      transform: translateY(-50%) scale(1.1);
    }

    /* ============ نظام الأزرار الجديد ============ */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .btn {
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    /* زر تسجيل الدخول الرئيسي */
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 200% 200%;
      color: white;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background-position: 100% 0;
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    /* زر الرجوع الثانوي */
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
    }

    /* زر تجريبي إضافي */
    .btn-demo {
      background: transparent;
      border: 1.5px dashed rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .btn-demo:hover:not(:disabled) {
      border-color: #667eea;
      color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    /* حالة تعطيل الزر */
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* مؤشر التحميل داخل الزر */
    .btn-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============ رسائل الحالة ============ */
    .status-message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      animation: fadeInUp 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-success {
      background: rgba(37, 211, 102, 0.15);
      border: 1px solid rgba(37, 211, 102, 0.3);
      color: #25d366;
    }

    .status-error {
      background: rgba(255, 77, 77, 0.15);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: #ff4d4d;
    }

    .status-info {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.3);
      color: #667eea;
    }

    /* ============ روابط إضافية ============ */
    .extra-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .extra-links a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .extra-links a:hover {
      color: #667eea;
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* ============ كلمة مرور عشوائية للاختبار ============ */
    .demo-hint {
      margin-top: 16px;
      padding: 10px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 12px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: 0.3s;
    }

    .demo-hint:hover {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 480px) {
      .card-content {
        padding: 36px 24px;
      }

      .logo-icon {
        width: 65px;
        height: 65px;
        font-size: 38px;
      }

      .logo-section h1 {
        font-size: 26px;
      }

      .btn {
        padding: 14px 20px;
      }
    }
  </style>
</head>
<body>

<div class="bg-animation">
  <div class="gradient-bg"></div>
  <div class="waves"></div>
</div>

<div id="particles"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-accent"></div>

    <div class="card-content">
      <!-- الشعار -->
      <div class="logo-section">
        <div class="logo-icon">🎓</div>
        <h1>Al-Ma'moun</h1>
        <p>منصة التعليم الذكية</p>
      </div>

      <!-- حقول الإدخال -->
      <div class="input-field">
        <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email">
        <span class="input-icon">📧</span>
      </div>

      <div class="input-field">
        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
        <span class="input-icon">🔒</span>
      </div>

      <!-- مجموعة الأزرار -->
      <div class="btn-group">
        <button class="btn btn-primary" id="loginBtn">
          <span>✨ تسجيل الدخول</span>
        </button>

        <button class="btn btn-secondary" id="backBtn">
          <span>🏠 الرجوع للرئيسية</span>
        </button>

        <button class="btn btn-demo" id="demoHintBtn">
          <span>🔐 بيانات تجريبية للدخول</span>
        </button>
      </div>

      <!-- رسالة الحالة -->
      <div id="loginStatus"></div>

      <!-- روابط إضافية -->
      <div class="extra-links">
        <a href="#">❓ مساعدة</a>
        <a href="#">📞 تواصل مع الدعم</a>
      </div>

      <div class="footer-text">
        Developed by Eng Mohamed Hesham 👨🏻‍💻
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
  const supabase = createClient(supabaseUrl, supabaseKey)

  // إظهار رسالة الحالة
  function showStatus(message, type = 'info') {
    const statusDiv = document.getElementById('loginStatus')
    if (statusDiv) {
      statusDiv.innerHTML = `<div class="status-message status-${type}">
        <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : '⏳'}</span>
        <span>${message}</span>
      </div>`
    }
  }

  function hideStatus() {
    const statusDiv = document.getElementById('loginStatus')
    if (statusDiv) {
      statusDiv.innerHTML = ''
    }
  }

  // تعطيل/تفعيل الأزرار
  function setButtonsEnabled(enabled) {
    const btns = ['loginBtn', 'backBtn', 'demoHintBtn']
    btns.forEach(id => {
      const btn = document.getElementById(id)
      if (btn) btn.disabled = !enabled
    })
  }

  // تغيير نص زر تسجيل الدخول
  function setLoginButtonLoading(isLoading) {
    const loginBtn = document.getElementById('loginBtn')
    if (loginBtn) {
      if (isLoading) {
        loginBtn.innerHTML = '<span class="btn-spinner"></span> <span>جاري التحقق...</span>'
      } else {
        loginBtn.innerHTML = '<span>✨ تسجيل الدخول</span>'
      }
    }
  }

  // بيانات تجريبية (للاختبار)
  function showDemoCredentials() {
    const emailInput = document.getElementById('email')
    const passInput = document.getElementById('password')

    if (emailInput && passInput) {
      emailInput.value = 'student@test.com'
      passInput.value = '123456'
      showStatus('📝 تم ملء بيانات تجريبية. يمكنك تعديلها قبل تسجيل الدخول', 'info')
      setTimeout(() => hideStatus(), 3000)
    }
  }

  // دالة تسجيل الدخول الرئيسية
  async function handleLogin() {
    const emailInput = document.getElementById('email')
    const passInput = document.getElementById('password')

    const email = emailInput?.value.trim()
    const pass = passInput?.value.trim()

    if (!email || !pass) {
      showStatus('يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error')
      return
    }

    if (!email.includes('@')) {
      showStatus('البريد الإلكتروني غير صحيح', 'error')
      return
    }

    setButtonsEnabled(false)
    setLoginButtonLoading(true)
    showStatus('جاري التحقق من البيانات...', 'info')

    try {
      const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("email", email)
        .eq("password", pass)
        .single()

      if (error || !data) {
        showStatus('البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error')
        setButtonsEnabled(true)
        setLoginButtonLoading(false)
        return
      }

      if (data.is_active === false) {
        showStatus('حسابك معطل. يرجى التواصل مع الإدارة', 'error')
        setButtonsEnabled(true)
        setLoginButtonLoading(false)
        return
      }

      showStatus('تم التحقق بنجاح! جاري التوجيه...', 'success')

      localStorage.setItem("currentUser", JSON.stringify(data))

      // تسجيل سجل الدخول (غير متزامن)
      try {
        supabase.from("login_logs").insert([{
          user_id: data.id,
          user_name: data.name,
          user_email: data.email,
          user_role: data.role,
          login_time: new Date().toISOString()
        }]).catch(e => console.warn("Log error:", e))
      } catch(e) {}

      // التحقق من وجود قائمة محفوظة للتوجيه
      const redirectPlaylistId = localStorage.getItem('redirectAfterLogin')
      if (redirectPlaylistId) {
        localStorage.removeItem('redirectAfterLogin')
        setTimeout(() => {
          window.location.href = `playlist-view.html?id=${redirectPlaylistId}`
        }, 800)
        return
      }

      // التوجيه حسب الدور
      setTimeout(() => {
        if (data.role === "admin") window.location.href = "admin.html"
        else if (data.role === "teacher") window.location.href = "teacher.html"
        else if (data.role === "student") window.location.href = "student-modern.html"
        else window.location.href = "dashboard-home.html"
      }, 800)

    } catch (error) {
      console.error("Login error:", error)
      showStatus('حدث خطأ في الاتصال. حاول مرة أخرى', 'error')
      setButtonsEnabled(true)
      setLoginButtonLoading(false)
    }
  }

  // الرجوع للصفحة الرئيسية
  function goBack() {
    const backBtn = document.getElementById('backBtn')
    backBtn.disabled = true
    backBtn.innerHTML = '<span>⏳ جاري...</span>'
    window.location.href = "dashboard-home.html"
  }

  // إنشاء الجزيئات
  function createParticles() {
    const container = document.getElementById('particles')
    if (container) {
      for (let i = 0; i < 50; i++) {
        const p = document.createElement('div')
        p.className = 'particle'
        const size = Math.random() * 6 + 2
        p.style.width = size + 'px'
        p.style.height = size + 'px'
        p.style.left = Math.random() * 100 + '%'
        p.style.animationDuration = (5 + Math.random() * 15) + 's'
        p.style.animationDelay = Math.random() * 10 + 's'
        container.appendChild(p)
      }
    }
  }

  // ربط الأحداث
  document.addEventListener('DOMContentLoaded', () => {
    createParticles()

    const loginBtn = document.getElementById('loginBtn')
    const backBtn = document.getElementById('backBtn')
    const demoHintBtn = document.getElementById('demoHintBtn')
    const emailInput = document.getElementById('email')
    const passInput = document.getElementById('password')

    if (loginBtn) loginBtn.onclick = (e) => { e.preventDefault(); handleLogin() }
    if (backBtn) backBtn.onclick = (e) => { e.preventDefault(); goBack() }
    if (demoHintBtn) demoHintBtn.onclick = (e) => { e.preventDefault(); showDemoCredentials() }

    // دعم مفتاح Enter
    const handleEnter = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault()
        handleLogin()
      }
    }
    if (emailInput) emailInput.addEventListener('keypress', handleEnter)
    if (passInput) passInput.addEventListener('keypress', handleEnter)
  })

  window.handleLogin = handleLogin
  window.goBack = goBack
</script>

</body>
</html>
