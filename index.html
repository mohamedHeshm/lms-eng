<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎓 المأمون • شخصية ثلاثية الأبعاد تمشي وتجري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0a1f2a 0%, #0b2b33 100%);
      overflow-x: hidden;
    }

    /* حاوية canvas للشخصية 3D */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* الخلفية التعليمية المتحركة (خلف الشخصية) */
    .edu-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .edu-float {
      position: absolute;
      font-size: 2.5rem;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,0.3));
      animation: floatAround 16s infinite ease-in-out;
      opacity: 0.5;
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(25px, -25px) rotate(6deg); }
      50% { transform: translate(-15px, 20px) rotate(-4deg); }
      75% { transform: translate(20px, 10px) rotate(3deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    .floating-word {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      color: rgba(210, 235, 255, 0.4);
      white-space: nowrap;
      animation: wordDrift 22s linear infinite;
    }

    @keyframes wordDrift {
      0% { transform: translateX(100vw) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateX(-200px) rotate(8deg); opacity: 0; }
    }

    /* بطاقة تسجيل الدخول */
    .login-wrapper {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
    }

    .glass-card {
      width: 100%;
      max-width: 500px;
      background: rgba(12, 25, 45, 0.85);
      backdrop-filter: blur(18px);
      border-radius: 56px;
      border: 1px solid rgba(110, 180, 255, 0.45);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: cardRise 0.7s ease-out;
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-inner {
      padding: 45px 38px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-circle {
      width: 85px;
      height: 85px;
      background: linear-gradient(135deg, #2b6c9e, #1e3c72);
      border-radius: 30px;
      display: flex;
      margin: 0 auto 18px;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      box-shadow: 0 15px 30px rgba(0, 50, 90, 0.5);
    }

    .logo-area h2 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(to left, #ffe6b0, #7bc5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-area p {
      color: #bbd4ff;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px 16px 55px;
      background: rgba(255, 255, 255, 0.07);
      border: 1.5px solid rgba(90, 170, 255, 0.4);
      border-radius: 40px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: #5aaaff;
      background: rgba(90, 170, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(90, 170, 255, 0.2);
    }

    .input-group input::placeholder {
      color: rgba(200, 220, 250, 0.6);
    }

    .input-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(95deg, #1f6392, #3a86b0);
      border: none;
      border-radius: 44px;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      background: linear-gradient(95deg, #2779ae, #4b97c4);
    }

    .demo-badge {
      background: rgba(255,215,130,0.2);
      border: 1px dashed #ffcf4a;
      border-radius: 40px;
      padding: 12px;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      color: #ffe1a0;
    }

    .demo-badge:hover {
      background: rgba(255,215,130,0.4);
    }

    .support-btn {
      width: 100%;
      background: rgba(30, 150, 100, 0.25);
      border: 1.5px solid #2ecc71;
      border-radius: 44px;
      padding: 12px;
      text-align: center;
      margin-top: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: #c8f0dc;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .support-btn:hover {
      background: rgba(46, 204, 113, 0.35);
      border-color: #2ecc71;
      color: white;
    }

    .status-area {
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      padding: 8px;
      border-radius: 32px;
    }

    .footer-note {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.7;
      color: #bbddff;
    }

    @media (max-width: 550px) {
      .card-inner { padding: 32px 22px; }
    }
  </style>
</head>
<body>

<div class="edu-bg">
  <div class="edu-float" style="top: 12%; left: 7%;">📚</div>
  <div class="edu-float" style="top: 22%; right: 10%;">✏️</div>
  <div class="edu-float" style="top: 48%; left: 5%;">🔬</div>
  <div class="edu-float" style="bottom: 22%; right: 12%;">🎓</div>
  <div class="edu-float" style="top: 68%; left: 18%;">📖</div>
  <div class="edu-float" style="top: 15%; right: 25%;">🧪</div>
  <div class="edu-float" style="top: 55%; left: 28%;">📏</div>
  <div class="edu-float" style="bottom: 38%; right: 22%;">🌍</div>
  <div class="edu-float" style="top: 82%; left: 75%;">💡</div>
  <div class="edu-float" style="top: 35%; left: 60%;">📝</div>
  <div class="floating-word" style="top: 12%; animation-duration: 24s;">✨ العلم نور ✨</div>
  <div class="floating-word" style="top: 42%; animation-duration: 20s; animation-delay: 2s;">📖 اقرأ و ارتقِ 📖</div>
  <div class="floating-word" style="top: 70%; animation-duration: 26s; animation-delay: 4s;">⭐ تعليم بلا حدود ⭐</div>
</div>

<div id="canvas-container"></div>

<div class="login-wrapper">
  <div class="glass-card">
    <div class="card-inner">
      <div class="logo-area">
        <div class="logo-circle">🏫</div>
        <h2>مدارس المأمون</h2>
        <p>منصة تفاعلية تعليمية متكاملة</p>
      </div>

      <div class="input-group">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <div class="input-icon">📧</div>
      </div>

      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <div class="input-icon">🔑</div>
      </div>

      <button id="loginBtnAction" class="btn-login">
        <span>🚀</span> دخول إلى منصتي
      </button>

      <div id="demoCredentialsBtn" class="demo-badge">
        ⚡ بيانات تجريبية ⚡
      </div>

      <div id="supportBtn" class="support-btn">
        📞 تواصل مع الدعم الفني 📞
      </div>

      <div id="statusMsg" class="status-area"></div>
      <div class="footer-note">
        🧠 التعليم متعة | تطوير: مهندس محمد هشام
      </div>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co";
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN";
  const supabase = createClient(supabaseUrl, supabaseKey);

  // ========== إعداد المشهد ثلاثي الأبعاد ==========
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = null;
  scene.fog = new THREE.FogExp2(0x0a1f2a, 0.008);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 8);
  camera.lookAt(0, 1.2, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  // إضاءة
  const ambientLight = new THREE.AmbientLight(0x404060);
  scene.add(ambientLight);
  const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
  mainLight.position.set(5, 8, 4);
  mainLight.castShadow = true;
  mainLight.receiveShadow = true;
  scene.add(mainLight);
  const fillLight = new THREE.PointLight(0x4466cc, 0.5);
  fillLight.position.set(-2, 3, 4);
  scene.add(fillLight);
  const backLight = new THREE.PointLight(0xffaa66, 0.4);
  backLight.position.set(0, 2, -3);
  scene.add(backLight);

  // أرضية شفافة لاستقبال الظل
  const groundPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(12, 6),
    new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
  );
  groundPlane.rotation.x = -Math.PI / 2;
  groundPlane.position.y = -0.85;
  groundPlane.receiveShadow = true;
  scene.add(groundPlane);

  // ========== إنشاء شخصية كاملة الجسم (رأس، جذع، يدين، رجلين) ==========
  const characterGroup = new THREE.Group();

  // الجسم (الجذع)
  const bodyGeo = new THREE.BoxGeometry(0.7, 0.9, 0.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5, roughness: 0.4, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0;
  body.castShadow = true;
  body.receiveShadow = true;
  characterGroup.add(body);

  // الرأس
  const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xfdd7a8, roughness: 0.3 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 0.85;
  head.castShadow = true;
  characterGroup.add(head);

  // العينان
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
  const leftEyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMat);
  leftEyeWhite.position.set(-0.18, 0.98, 0.44);
  const rightEyeWhite = new THREE.Mesh(new THREE.SphereGeometry(0.12, 24, 24), eyeMat);
  rightEyeWhite.position.set(0.18, 0.98, 0.44);
  const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), pupilMat);
  leftPupil.position.set(-0.18, 0.97, 0.55);
  const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.07, 24, 24), pupilMat);
  rightPupil.position.set(0.18, 0.97, 0.55);
  characterGroup.add(leftEyeWhite, rightEyeWhite, leftPupil, rightPupil);

  // قبعة/طاقية (لمسة تعليمية)
  const hatGeo = new THREE.CylinderGeometry(0.55, 0.7, 0.2, 8);
  const hatMat = new THREE.MeshStandardMaterial({ color: 0x2c5282 });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.y = 1.12;
  hat.castShadow = true;
  characterGroup.add(hat);

  const hatTopGeo = new THREE.CylinderGeometry(0.35, 0.45, 0.15, 8);
  const hatTop = new THREE.Mesh(hatTopGeo, hatMat);
  hatTop.position.y = 1.22;
  hatTop.castShadow = true;
  characterGroup.add(hatTop);

  // الذراع الأيمن
  const rightArmGeo = new THREE.BoxGeometry(0.28, 0.65, 0.28);
  const armMat = new THREE.MeshStandardMaterial({ color: 0x3a6ea5 });
  const rightArm = new THREE.Mesh(rightArmGeo, armMat);
  rightArm.position.set(0.55, 0.35, 0);
  rightArm.castShadow = true;
  characterGroup.add(rightArm);

  // الذراع الأيسر
  const leftArm = new THREE.Mesh(rightArmGeo.clone(), armMat);
  leftArm.position.set(-0.55, 0.35, 0);
  leftArm.castShadow = true;
  characterGroup.add(leftArm);

  // اليد اليمنى (كروية)
  const handMat = new THREE.MeshStandardMaterial({ color: 0xfdd7a8 });
  const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), handMat);
  rightHand.position.set(0.72, 0.02, 0);
  rightHand.castShadow = true;
  rightArm.add(rightHand);

  const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), handMat);
  leftHand.position.set(-0.72, 0.02, 0);
  leftHand.castShadow = true;
  leftArm.add(leftHand);

  // الرجل اليمنى
  const legMat = new THREE.MeshStandardMaterial({ color: 0x2c5282 });
  const rightLegGeo = new THREE.BoxGeometry(0.28, 0.7, 0.32);
  const rightLeg = new THREE.Mesh(rightLegGeo, legMat);
  rightLeg.position.set(0.22, -0.55, 0);
  rightLeg.castShadow = true;
  characterGroup.add(rightLeg);

  // الرجل اليسرى
  const leftLeg = new THREE.Mesh(rightLegGeo.clone(), legMat);
  leftLeg.position.set(-0.22, -0.55, 0);
  leftLeg.castShadow = true;
  characterGroup.add(leftLeg);

  // حذاء
  const shoeMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const rightShoe = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.2, 0.45), shoeMat);
  rightShoe.position.set(0.22, -0.9, 0.08);
  rightShoe.castShadow = true;
  const leftShoe = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.2, 0.45), shoeMat);
  leftShoe.position.set(-0.22, -0.9, 0.08);
  leftShoe.castShadow = true;
  characterGroup.add(rightShoe, leftShoe);

  // شنطة على الظهر
  const bagGeo = new THREE.BoxGeometry(0.55, 0.6, 0.25);
  const bagMat = new THREE.MeshStandardMaterial({ color: 0xc97e3a });
  const bag = new THREE.Mesh(bagGeo, bagMat);
  bag.position.set(0, 0.1, -0.38);
  bag.castShadow = true;
  characterGroup.add(bag);

  scene.add(characterGroup);

  // تخزين الأجزاء المتحركة
  const limbs = {
    rightArm,
    leftArm,
    rightLeg,
    leftLeg,
    rightHand,
    leftHand
  };

  // حالة المشي والجري
  let walkTime = 0;
  let isRunningMode = false;
  let targetRunX = 1.2;
  let currentX = 0;
  let isLookingAtPassword = false;
  let runCompleted = false;
  let passwordFocused = false;

  // متغيرات الموقع
  let characterPosX = 0;
  const walkRange = { min: -3.2, max: 3.2 };
  let walkDirection = 1;

  // عناصر DOM
  const passwordInput = document.getElementById('loginPassword');
  const emailInput = document.getElementById('loginEmail');
  const loginBtn = document.getElementById('loginBtnAction');
  const demoBtn = document.getElementById('demoCredentialsBtn');
  const supportBtn = document.getElementById('supportBtn');
  const statusDiv = document.getElementById('statusMsg');

  // حركة المشي الطبيعية (تأرجح الأيدي والأرجل)
  function animateWalking(isRunning) {
    const speed = isRunning ? 0.45 : 0.22;
    walkTime += speed;
    const swing = Math.sin(walkTime) * (isRunning ? 0.9 : 0.55);
    const legSwing = Math.sin(walkTime) * (isRunning ? 0.7 : 0.45);

    if (limbs.rightArm) limbs.rightArm.rotation.z = -swing;
    if (limbs.leftArm) limbs.leftArm.rotation.z = swing;
    if (limbs.rightLeg) limbs.rightLeg.rotation.x = legSwing;
    if (limbs.leftLeg) limbs.leftLeg.rotation.x = -legSwing;

    // حركة طفيفة للرأس
    head.rotation.z = Math.sin(walkTime * 1.5) * 0.05;
  }

  // تحديث موقع الشخصية على المسرح
  function updatePosition() {
    characterGroup.position.x = characterPosX;
    // دوران بسيط حسب الاتجاه
    if (walkDirection > 0) characterGroup.rotation.y = 0;
    else characterGroup.rotation.y = Math.PI;
  }

  // بدء المشي العادي
  function startNormalWalk() {
    isRunningMode = false;
    passwordFocused = false;
    runCompleted = false;
    isLookingAtPassword = false;
    // إعادة العيون لوضعها الطبيعي
    leftPupil.position.z = 0.55;
    rightPupil.position.z = 0.55;
    leftPupil.position.x = -0.18;
    rightPupil.position.x = 0.18;
  }

  // الجري نحو حقل كلمة المرور
  function runToPassword() {
    if (runCompleted && passwordFocused) return;
    isRunningMode = true;
    passwordFocused = true;
    const targetX = 1.5;
    const step = 0.12;

    const runInterval = setInterval(() => {
      if (!passwordFocused) {
        clearInterval(runInterval);
        return;
      }
      if (Math.abs(characterPosX - targetX) < 0.15) {
        characterPosX = targetX;
        updatePosition();
        clearInterval(runInterval);
        runCompleted = true;
        isRunningMode = false;
        // الشخصية تقف وتنظر إلى كلمة المرور
        leftPupil.position.x = -0.05;
        rightPupil.position.x = 0.05;
        leftPupil.position.z = 0.62;
        rightPupil.position.z = 0.62;
        isLookingAtPassword = true;
        // توقف الأرجل عن الحركة
        walkTime = 0;
        if (limbs.rightArm) limbs.rightArm.rotation.z = 0;
        if (limbs.leftArm) limbs.leftArm.rotation.z = 0;
        if (limbs.rightLeg) limbs.rightLeg.rotation.x = 0;
        if (limbs.leftLeg) limbs.leftLeg.rotation.x = 0;
        return;
      }
      if (characterPosX < targetX) {
        characterPosX += step;
        walkDirection = 1;
      } else {
        characterPosX -= step;
        walkDirection = -1;
      }
      updatePosition();
      animateWalking(true);
    }, 35);

    window._currentRunInterval = runInterval;
  }

  function stopRunAndWalk() {
    passwordFocused = false;
    runCompleted = false;
    isLookingAtPassword = false;
    if (window._currentRunInterval) clearInterval(window._currentRunInterval);
    leftPupil.position.x = -0.18;
    rightPupil.position.x = 0.18;
    leftPupil.position.z = 0.55;
    rightPupil.position.z = 0.55;
    // متابعة المشي العادي
    startNormalWalk();
  }

  // ربط الأحداث مع حقل كلمة المرور
  passwordInput.addEventListener('focus', () => {
    if (!runCompleted) {
      runToPassword();
    } else {
      // إذا كان قد ركض سابقاً لا يركض مجدداً لكن ينظر
      isLookingAtPassword = true;
      leftPupil.position.x = -0.05;
      rightPupil.position.x = 0.05;
    }
  });

  passwordInput.addEventListener('blur', () => {
    stopRunAndWalk();
  });

  // حلقة التحريك الرئيسية
  let lastTimestamp = 0;
  function animateLoop() {
    requestAnimationFrame(animateLoop);
    // تحديث حركة المشي إذا لم يكن في وضع الجري أو النظر
    if (!isRunningMode && !runCompleted && !isLookingAtPassword) {
      // حركة المشي العادي مع تغيير الموقع يسار ويمين
      if (!passwordFocused) {
        characterPosX += 0.008 * walkDirection;
        if (characterPosX > walkRange.max) {
          characterPosX = walkRange.max;
          walkDirection = -1;
        } else if (characterPosX < walkRange.min) {
          characterPosX = walkRange.min;
          walkDirection = 1;
        }
        updatePosition();
        animateWalking(false);
      } else {
        animateWalking(false);
      }
    } else if (isRunningMode && !runCompleted) {
      animateWalking(true);
    } else if (runCompleted && isLookingAtPassword) {
      // توقف تام، فقط اهتزاز خفيف للرأس (ينظر)
      head.rotation.x = Math.sin(Date.now() * 0.008) * 0.03;
      head.rotation.z = Math.sin(Date.now() * 0.006) * 0.02;
    }

    // تحريك الكاميرا قليلاً مع الشخصية لمتابعتها
    camera.position.x = characterPosX * 0.3;
    camera.lookAt(characterPosX, 1.2, 0);

    renderer.render(scene, camera);
  }

  animateLoop();

  // تسجيل الدخول
  function showStatusMessage(msg, type = 'info') {
    statusDiv.innerHTML = `<div style="background: ${type === 'error' ? 'rgba(255,80,80,0.2)' : 'rgba(90,170,255,0.2)'}; border-radius: 60px; padding: 10px; color: ${type === 'error' ? '#ffaeae' : '#c4e6ff'}">${msg}</div>`;
    setTimeout(() => { if (statusDiv.innerHTML.includes(msg)) statusDiv.innerHTML = ''; }, 3800);
  }

  async function performLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    if (!email || !password) { showStatusMessage('❌ يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error'); return; }
    if (!email.includes('@')) { showStatusMessage('📧 البريد الإلكتروني غير صالح', 'error'); return; }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span>⏳</span> جاري التحقق...';
    try {
      const { data, error } = await supabase.from("users").select("*").eq("email", email).eq("password", password).single();
      if (error || !data) { showStatusMessage('🔐 بيانات الدخول غير صحيحة', 'error'); loginBtn.disabled = false; loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي'; return; }
      if (data.is_active === false) { showStatusMessage('⚠️ الحساب معطل', 'error'); loginBtn.disabled = false; loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي'; return; }

      showStatusMessage('✅ مرحباً ' + (data.name || 'عزيزي المستخدم') + '!', 'success');
      localStorage.setItem("currentUser", JSON.stringify(data));
      try { await supabase.from("login_logs").insert([{ user_id: data.id, user_name: data.name, user_email: data.email, user_role: data.role, login_time: new Date().toISOString() }]); } catch(e) {}
      setTimeout(() => {
        if (data.role === "admin") window.location.href = "admin.html";
        else if (data.role === "teacher") window.location.href = "teacher.html";
        else if (data.role === "student") window.location.href = "student-modern.html";
        else window.location.href = "dashboard-home.html";
      }, 1100);
    } catch (err) { showStatusMessage('⚠️ خطأ في الاتصال', 'error'); loginBtn.disabled = false; loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي'; }
  }

  function fillDemoCredentials() { emailInput.value = "student@test.com"; passwordInput.value = "123456"; showStatusMessage('📝 تم تعبئة بيانات تجريبية', 'info'); }
  function contactSupport() { window.open('https://wa.me/201234567890?text=مرحباً، أحتاج مساعدة في منصة المأمون التعليمية', '_blank'); showStatusMessage('📱 جاري فتح محادثة واتساب', 'info'); }

  loginBtn.onclick = (e) => { e.preventDefault(); performLogin(); };
  demoBtn.onclick = (e) => { e.preventDefault(); fillDemoCredentials(); };
  supportBtn.onclick = (e) => { e.preventDefault(); contactSupport(); };
  const handleEnter = (e) => { if (e.key === 'Enter') performLogin(); };
  emailInput.addEventListener('keypress', handleEnter);
  passwordInput.addEventListener('keypress', handleEnter);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  startNormalWalk();
</script>
</body>
</html>
