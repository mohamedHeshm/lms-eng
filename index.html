<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎓 عزيزي المعلم • عالم المعرفة التفاعلي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* لمنع التحديد العرضي، لكن يمكن الكتابة طبعاً */
    }

    html, body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #071b2b 0%, #0a1f2a 40%, #0e2a2f 100%);
      overflow-x: hidden;
    }

    /* ========== المشهد التفاعلي الرئيسي (الخلفية الحية) ========== */
    .interactive-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* حتى لا تعيق النقر على الفورم */
    }

    /* الطبقة المتدرجة الخلفية */
    .sky-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(46, 134, 222, 0.25), rgba(20, 40, 60, 0.7));
      animation: breatheGlow 12s infinite alternate;
    }

    @keyframes breatheGlow {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* العناصر التعليمية المتعددة المتحركة (كتب، أقلام، شهادات، ألغاز) */
    .edu-float {
      position: absolute;
      font-size: 2.4rem;
      filter: drop-shadow(0 5px 12px rgba(0,0,0,0.3));
      animation: floatAround 14s infinite ease-in-out;
      opacity: 0.55;
      transition: transform 0.2s;
    }

    @keyframes floatAround {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(25px, -20px) rotate(6deg); }
      50% { transform: translate(-15px, 15px) rotate(-4deg); }
      75% { transform: translate(20px, 10px) rotate(3deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    /* حركات مختلفة لبعض العناصر */
    .edu-float:nth-child(odd) { animation-duration: 18s; }
    .edu-float:nth-child(3n) { animation-duration: 12s; opacity: 0.7; }

    /* الشخصية الرئيسية (الطالب الذي يحمل الشنطة) */
    .student-walker {
      position: absolute;
      bottom: 6%;
      left: -10%;
      font-size: 4.5rem;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 12;
      pointer-events: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,0,0,0.1);
      border-radius: 100px;
      padding: 0 10px 0 5px;
      backdrop-filter: blur(3px);
    }

    .student-walker span {
      font-size: 2.8rem;
    }

    .walker-label {
      font-size: 0.9rem;
      background: rgba(0,0,0,0.5);
      padding: 2px 8px;
      border-radius: 40px;
      color: #ffefb9;
      font-weight: 600;
    }

    /* موجات تعليمية في الأسفل (أوراق و رموز) */
    .wave-edu {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 90px;
      background: repeating-linear-gradient( transparent 0px, transparent 28px, rgba(102, 204, 255, 0.1) 28px, rgba(70, 150, 210, 0.2) 40px);
      animation: waveShift 10s linear infinite;
      z-index: 5;
    }

    @keyframes waveShift {
      0% { background-position: 0 0; }
      100% { background-position: 200px 0; }
    }

    /* نجوم صغيرة / كلمات متحركة */
    .floating-word {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      color: rgba(220, 240, 255, 0.5);
      white-space: nowrap;
      animation: wordDrift 20s linear infinite;
    }

    @keyframes wordDrift {
      0% { transform: translateX(100vw) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateX(-200px) rotate(10deg); opacity: 0; }
    }

    /* ========== بطاقة تسجيل الدخول ========== */
    .login-wrapper {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .glass-card {
      width: 100%;
      max-width: 500px;
      background: rgba(12, 25, 45, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 56px;
      border: 1px solid rgba(110, 180, 255, 0.4);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      transition: transform 0.3s ease;
      animation: cardRise 0.7s ease-out;
    }

    @keyframes cardRise {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-inner {
      padding: 45px 38px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-circle {
      width: 85px;
      height: 85px;
      background: linear-gradient(135deg, #2b6c9e, #1e3c72);
      border-radius: 30px;
      display: flex;
      margin: 0 auto 18px;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      box-shadow: 0 15px 30px rgba(0, 50, 90, 0.5);
      transition: 0.2s;
    }

    .logo-area h2 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(to left, #ffe6b0, #7bc5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-area p {
      color: #bbd4ff;
      font-size: 14px;
    }

    /* الحقول */
    .input-group {
      margin-bottom: 24px;
      position: relative;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px 16px 55px;
      background: rgba(255, 255, 255, 0.07);
      border: 1.5px solid rgba(90, 170, 255, 0.3);
      border-radius: 40px;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      color: #fff;
      outline: none;
      transition: all 0.3s;
    }

    .input-group input:focus {
      border-color: #5aaaff;
      background: rgba(90, 170, 255, 0.1);
      box-shadow: 0 0 0 4px rgba(90, 170, 255, 0.2);
    }

    .input-group input::placeholder {
      color: rgba(200, 220, 250, 0.5);
    }

    .input-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      opacity: 0.7;
    }

    /* زر الدخول */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(95deg, #1f6392, #3a86b0);
      border: none;
      border-radius: 44px;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      background: linear-gradient(95deg, #2779ae, #4b97c4);
      box-shadow: 0 15px 25px rgba(0, 0, 0, 0.4);
    }

    .demo-badge {
      background: rgba(255,215,130,0.2);
      border: 1px dashed #ffcf4a;
      border-radius: 40px;
      padding: 12px;
      text-align: center;
      margin-top: 25px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
      color: #ffe1a0;
    }

    .demo-badge:hover {
      background: rgba(255,215,130,0.4);
    }

    .status-area {
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      padding: 8px;
      border-radius: 32px;
    }

    .footer-note {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      opacity: 0.6;
      color: #bbddff;
    }

    /* استجابة */
    @media (max-width: 550px) {
      .card-inner { padding: 32px 22px; }
      .student-walker { font-size: 3rem; bottom: 3%; }
      .student-walker span { font-size: 2rem; }
      .edu-float { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<!-- المشهد الحي + شخصية الطالب التي تمشي و تجري عند التركيز على كلمة المرور -->
<div class="interactive-scene">
  <div class="sky-glow"></div>

  <!-- الكثير من العناصر التعليمية المتحركة (كتب, قلم, مجهر, شهادة, مسطرة, كرة أرضية) -->
  <div class="edu-float" style="top: 12%; left: 7%;">📚</div>
  <div class="edu-float" style="top: 25%; right: 12%;">✏️</div>
  <div class="edu-float" style="top: 45%; left: 3%;">🔬</div>
  <div class="edu-float" style="bottom: 20%; right: 8%;">🎓</div>
  <div class="edu-float" style="top: 70%; left: 15%;">📖</div>
  <div class="edu-float" style="top: 15%; right: 22%;">🧪</div>
  <div class="edu-float" style="top: 60%; left: 25%;">📏</div>
  <div class="edu-float" style="bottom: 35%; right: 18%;">🌍</div>
  <div class="edu-float" style="top: 82%; left: 80%;">💡</div>
  <div class="edu-float" style="top: 8%; left: 40%;">📘</div>
  <div class="edu-float" style="top: 33%; left: 55%;">📝</div>
  <div class="edu-float" style="bottom: 50%; left: 70%;">🧠</div>
  <div class="edu-float" style="top: 90%; right: 30%;">🎒</div>

  <!-- كلمات عائمة (تعليمية) -->
  <div class="floating-word" style="top: 15%; animation-duration: 24s;">✨ المعرفة نور ✨</div>
  <div class="floating-word" style="top: 45%; animation-duration: 19s; animation-delay: 2s;">📖 اقرأ و ارتقِ 📖</div>
  <div class="floating-word" style="top: 75%; animation-duration: 27s; animation-delay: 5s;">⭐ العلم نور ⭐</div>
  <div class="floating-word" style="top: 60%; animation-duration: 22s; animation-delay: 1s;">🧑‍🏫 معلم المستقبل</div>

  <!-- الشخصية التي تمشي (طالب مع شنطة) -->
  <div id="studentChar" class="student-walker">
    <span>🧑‍🎓</span>
    <span>🎒</span>
    <div class="walker-label">أنا أتعلم</div>
  </div>

  <!-- موجة سفلى بتأثير تعليمي -->
  <div class="wave-edu"></div>
</div>

<!-- نموذج الدخول -->
<div class="login-wrapper">
  <div class="glass-card">
    <div class="card-inner">
      <div class="logo-area">
        <div class="logo-circle">🏫</div>
        <h2>مدارس المأمون</h2>
        <p>منصة تفاعلية تعليمية متكاملة</p>
      </div>

      <div class="input-group">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" autocomplete="email">
        <div class="input-icon">📧</div>
      </div>

      <div class="input-group" id="passwordGroup">
        <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
        <div class="input-icon">🔑</div>
      </div>

      <button id="loginBtnAction" class="btn-login">
        <span>🚀</span> دخول إلى منصتي
      </button>

      <div id="demoCredentialsBtn" class="demo-badge">
        ⚡ بيانات تجريبية (طالب/معلم) ⚡
      </div>

      <div id="statusMsg" class="status-area"></div>
      <div class="footer-note">
        🧠 التعليم متعة | تطوير: مهندس محمد هشام
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  // إعداد Supabase
  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
  const supabase = createClient(supabaseUrl, supabaseKey)

  // عناصر الشخصية والحركة
  const studentElement = document.getElementById('studentChar');
  const passwordInput = document.getElementById('loginPassword');
  const emailInput = document.getElementById('loginEmail');
  const loginBtn = document.getElementById('loginBtnAction');
  const demoBtn = document.getElementById('demoCredentialsBtn');
  const statusDiv = document.getElementById('statusMsg');

  // متغيرات للتحكم في الحركة
  let walkInterval = null;
  let isRunning = false;
  let currentPos = -10; // نسبة مئوية left
  let direction = 1;    // 1 = يمين , -1 = يسار
  let isFocusedOnPassword = false;
  let runInterval = null;
  let normalWalkLoop = null;

  // تهيئة موقع البداية
  function initWalkerPosition() {
    currentPos = -8;   // تبدأ من يسار الشاشة
    studentElement.style.left = `${currentPos}%`;
    studentElement.style.transition = "left 0.08s linear";
  }

  // حركة المشي العادية (بطيئة)
  function startWalking() {
    if (normalWalkLoop) clearInterval(normalWalkLoop);
    if (runInterval) clearInterval(runInterval);
    normalWalkLoop = setInterval(() => {
      if (isFocusedOnPassword) return; // لو ركضنا ما نمشي
      let step = 0.65;   // سرعة مشي
      currentPos += step;
      if (currentPos >= 105) {
        currentPos = -12;
      }
      studentElement.style.left = `${currentPos}%`;
      // تغيير الوجهة: انعكاس الاتجاه بشكل بسيط (إضافة مرونة)
      if (currentPos > 95) {
        // يمكن قلب النص (اختياري)
        studentElement.style.transform = "scaleX(-1)";
      } else if (currentPos < 0) {
        studentElement.style.transform = "scaleX(1)";
      } else {
        // إذا كان الاتجاه طبيعي بدون تقليب
        if (currentPos > 40 && currentPos < 70) studentElement.style.transform = "scaleX(1)";
      }
    }, 180);
  }

  // وظيفة الجري السريع (عند التركيز على كلمة المرور)
  function startRunningTowardsPassword() {
    if (runInterval) clearInterval(runInterval);
    if (normalWalkLoop) clearInterval(normalWalkLoop);

    // تغيير التعبير: نضيف sprint effect
    studentElement.style.transition = "left 0.05s cubic-bezier(0.25, 1, 0.5, 1)";
    // نضيف مؤقت سريع للجري إلى منتصف الشاشة تقريبًا (بالقرب من حقل الباسورد)
    let targetPos = 42; // نسبيًا حيث يظهر حقل كلمة المرور في المنتصف

    runInterval = setInterval(() => {
      if (!isFocusedOnPassword) {
        // إذا توقف التركيز نعود للمشي تدريجياً
        stopRunningAndResetWalk();
        return;
      }
      let diff = targetPos - currentPos;
      if (Math.abs(diff) < 2) {
        // وصل إلى منطقة الباسورد، يبقى واقفا ويحدق
        studentElement.style.left = `${targetPos}%`;
        // يغير المظهر لشخص "ينظر بفضول"
        studentElement.innerHTML = `<span>🧑‍🎓🔍</span><span>🎒</span><div class="walker-label">!ينظر إلى كلمة المرور</div>`;
        clearInterval(runInterval);
        runInterval = null;
        // نرتعش قليلاً
        studentElement.style.animation = "shakeHead 0.4s infinite";
        const styleShake = document.createElement('style');
        if (!document.querySelector('#shakeKeyframe')) {
          styleShake.id = 'shakeKeyframe';
          styleShake.textContent = `@keyframes shakeHead { 0% { transform: translateX(0px); } 25% { transform: translateX(4px); } 75% { transform: translateX(-4px); } 100% { transform: translateX(0); } }`;
          document.head.appendChild(styleShake);
        }
        studentElement.style.animation = "shakeHead 0.2s infinite";
        return;
      }
      // الجري السريع نحو الهدف
      let runStep = (diff > 0) ? Math.min(4.8, diff) : Math.max(-4.8, diff);
      currentPos += runStep;
      studentElement.style.left = `${currentPos}%`;
      if (currentPos > 30 && currentPos < 70) studentElement.style.transform = "scaleX(1)";
    }, 35);
  }

  function stopRunningAndResetWalk() {
    if (runInterval) { clearInterval(runInterval); runInterval = null; }
    // إعادة تعيين الهزات
    studentElement.style.animation = "";
    // إعادة المحتوى الأصلي مع شارة
    studentElement.innerHTML = `<span>🧑‍🎓</span><span>🎒</span><div class="walker-label">أنا أتعلم</div>`;
    studentElement.style.transition = "left 0.1s linear";
    // استئناف المشي العادي
    if (normalWalkLoop) clearInterval(normalWalkLoop);
    startWalking();
  }

  // عند التركيز على حقل كلمة المرور (يجري نحو الحقل ويبص)
  function onPasswordFocus() {
    if (isFocusedOnPassword) return;
    isFocusedOnPassword = true;
    // تغيير سلوك الشخصية: تجري بسرعة تجاه حقل الباسورد وتنظر إليه
    if (normalWalkLoop) clearInterval(normalWalkLoop);
    if (runInterval) clearInterval(runInterval);
    startRunningTowardsPassword();
  }

  function onPasswordBlur() {
    if (!isFocusedOnPassword) return;
    isFocusedOnPassword = false;
    // إعادة تشغيل المشي الطبيعي بعد توقف الركض
    if (runInterval) { clearInterval(runInterval); runInterval = null; }
    studentElement.style.animation = "";
    studentElement.innerHTML = `<span>🧑‍🎓</span><span>🎒</span><div class="walker-label">أنا أتعلم</div>`;
    currentPos = parseFloat(studentElement.style.left) || currentPos;
    // استمرار المشي
    if (normalWalkLoop) clearInterval(normalWalkLoop);
    startWalking();
  }

  // عرض رسالة
  function showStatusMessage(msg, type = 'info') {
    statusDiv.innerHTML = `<div style="background: ${type === 'error' ? 'rgba(255,80,80,0.2)' : 'rgba(90,170,255,0.2)'}; border-radius: 60px; padding: 10px; color: ${type === 'error' ? '#ffaeae' : '#c4e6ff'}">${msg}</div>`;
    setTimeout(() => {
      if (statusDiv.innerHTML.includes(msg)) statusDiv.innerHTML = '';
    }, 3500);
  }

  // تسجيل الدخول الفعلي
  async function performLogin() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    if (!email || !password) {
      showStatusMessage('❌ يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error');
      return;
    }
    if (!email.includes('@')) {
      showStatusMessage('📧 البريد الإلكتروني غير صالح', 'error');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span>⏳</span> جاري التحقق...';
    try {
      const { data, error } = await supabase
        .from("users")
        .select("*")
        .eq("email", email)
        .eq("password", password)
        .single();

      if (error || !data) {
        showStatusMessage('🔐 بيانات الدخول غير صحيحة، تأكد من البريد وكلمة المرور', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي';
        return;
      }

      if (data.is_active === false) {
        showStatusMessage('⚠️ الحساب معطل، تواصل مع الإدارة', 'error');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي';
        return;
      }

      showStatusMessage('✅ مرحباً ' + (data.name || 'عزيزي المستخدم') + '! جاري التوجيه...', 'success');
      localStorage.setItem("currentUser", JSON.stringify(data));

      // تسجيل سجل الدخول
      try {
        await supabase.from("login_logs").insert([{
          user_id: data.id,
          user_name: data.name,
          user_email: data.email,
          user_role: data.role,
          login_time: new Date().toISOString()
        }]);
      } catch(e) { console.warn(e); }

      setTimeout(() => {
        if (data.role === "admin") window.location.href = "admin.html";
        else if (data.role === "teacher") window.location.href = "teacher.html";
        else if (data.role === "student") window.location.href = "student-modern.html";
        else window.location.href = "dashboard-home.html";
      }, 1100);

    } catch (err) {
      console.error(err);
      showStatusMessage('⚠️ خطأ في الاتصال، حاول مرة أخرى', 'error');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<span>🚀</span> دخول إلى منصتي';
    }
  }

  // ملء بيانات تجريبية (ديناميكية)
  function fillDemoCredentials() {
    // بيانات تجريبية معروفة مسبقاً (حسب قاعدة البيانات)
    emailInput.value = "student@test.com";
    passwordInput.value = "123456";
    showStatusMessage('📝 تم تعبئة بيانات تجريبية (student@test.com / 123456) يمكنك تعديلها', 'info');
    // اختياري: إثارة تأثير أن الشخصية تنظر ولكن ليس بالضرورة
  }

  // تهيئة الأحداث
  function initEvents() {
    passwordInput.addEventListener('focus', onPasswordFocus);
    passwordInput.addEventListener('blur', onPasswordBlur);
    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      performLogin();
    });
    demoBtn.addEventListener('click', (e) => {
      e.preventDefault();
      fillDemoCredentials();
      // إذا كان الحقل فارغ يمكن أن نلفت النظر أيضاً
    });
    // ضغط Enter
    const handleEnter = (e) => { if (e.key === 'Enter') performLogin(); };
    emailInput.addEventListener('keypress', handleEnter);
    passwordInput.addEventListener('keypress', handleEnter);
  }

  // بدء الحركات والمشي
  initWalkerPosition();
  startWalking();
  initEvents();

  // إضافة تأثير إضافي: إذا قام المستخدم بالكتابة في الباسورد، الشخصية تظل محدقة
  passwordInput.addEventListener('input', () => {
    if (isFocusedOnPassword && runInterval === null && document.activeElement === passwordInput) {
      // تأكد من أنه لا يزال يركض لكن واقف ينظر
      if (Math.abs(parseFloat(studentElement.style.left) - 42) < 8) {
        studentElement.innerHTML = `<span>🧑‍🎓👀</span><span>🎒</span><div class="walker-label">يبص لكلمة السر</div>`;
      }
    } else if (isFocusedOnPassword) {
      if (!runInterval && normalWalkLoop) {
        // لإعادة التأكيد
      }
    }
  });

  // إضافة لمسة أن الشخصية تتفاعل مع النقر على أي حقل آخر
  emailInput.addEventListener('focus', () => {
    // لا تجري، فقط تتجه قليلاً نظرة
    if (!isFocusedOnPassword) {
      studentElement.innerHTML = `<span>🧑‍🎓🤔</span><span>🎒</span><div class="walker-label">ينظر إلى البريد</div>`;
      setTimeout(() => {
        if (!isFocusedOnPassword && studentElement.innerHTML.includes("ينظر إلى البريد"))
          studentElement.innerHTML = `<span>🧑‍🎓</span><span>🎒</span><div class="walker-label">أنا أتعلم</div>`;
      }, 1200);
    }
  });

  // محاكاة بيئة تفاعلية تعليمية غنية
  console.log("✅ عالم تعليمي تفاعلي جاهز | الشخصية تمشي وتجري نحو حقل الباسورد");
</script>
