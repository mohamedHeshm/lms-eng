<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>LMS Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<div class="login-container">

  <div class="login-box-pro">

    <h2>🎓 Al-Ma'moun </h2>
    <p>تسجيل الدخول</p>

    <!-- Email -->
    <div class="input-group">
      <input type="email" id="email" required>
      <label>📧 الايميل</label>
    </div>

    <!-- Password -->
    <div class="input-group">
      <input type="password" id="password" required>
      <label>🔒 الباسورد</label>
    </div>

    <button onclick="login()"> دخول</button>

    <div class="footer-text">
      ✨ Developer by Mohamed Hesham ✨
    </div>

  </div>

</div>

<!-- Scroll -->
<button id="scrollTopBtn" onclick="scrollToTop()">⬆</button>
<button id="scrollBottomBtn" onclick="scrollToBottom()">⬇</button>

<script type="module" src="js/app.js"></script>
</body>
</html>
