<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Ma'moun | لوحة تحكم المدير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      position: relative;
    }

    /* خلفية متحركة */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-animation .circle {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
      25% { transform: translateY(-50px) translateX(30px) rotate(90deg); }
      50% { transform: translateY(0) translateX(0) rotate(180deg); }
      75% { transform: translateY(50px) translateX(-30px) rotate(270deg); }
    }

    .bg-animation .circle:nth-child(1) {
      width: 300px; height: 300px;
      top: -100px; right: -100px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
    }
    .bg-animation .circle:nth-child(2) {
      width: 500px; height: 500px;
      bottom: -200px; left: -200px;
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 82, 82, 0.2));
    }
    .bg-animation .circle:nth-child(3) {
      width: 200px; height: 200px;
      top: 50%; left: 20%;
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.2), rgba(255, 152, 0, 0.2));
    }
    .bg-animation .circle:nth-child(4) {
      width: 400px; height: 400px;
      bottom: 20%; right: -100px;
      background: linear-gradient(135deg, rgba(76, 175, 80, 0.2), rgba(33, 150, 243, 0.2));
    }

    /* الحاوية الرئيسية */
    .dashboard-container {
      position: relative;
      z-index: 2;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* رأس الصفحة */
    .dashboard-header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 25px 35px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo-area h1 {
      color: white;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a8c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-area p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 20px;
      border-radius: 50px;
    }

    .user-info span {
      color: white;
      font-weight: 500;
    }

    .logout-btn, .back-home-btn {
      background: rgba(255, 77, 77, 0.8);
      border: none;
      padding: 8px 20px;
      border-radius: 25px;
      color: white;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .back-home-btn {
      background: rgba(108, 117, 125, 0.8);
    }

    .logout-btn:hover, .back-home-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    /* إحصائيات */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 25px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.12);
    }

    .stat-card i {
      font-size: 45px;
      margin-bottom: 15px;
    }

    .stat-card .stat-number {
      font-size: 36px;
      font-weight: 800;
      color: white;
    }

    .stat-card .stat-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
    }

    /* بطاقات الإجراءات السريعة */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .action-btn {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      transform: translateY(-5px);
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4));
      border-color: rgba(255, 255, 255, 0.4);
    }

    .action-btn i {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .action-btn span {
      display: block;
      font-size: 16px;
      font-weight: 500;
    }

    /* جداول المستخدمين */
    .users-section {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .section-title {
      color: white;
      font-size: 24px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(102, 126, 234, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .add-user-btn {
      background: linear-gradient(135deg, #25d366, #128c7e);
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      color: white;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .users-table {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    th, td {
      padding: 15px;
      text-align: right;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    th {
      color: #a8c0ff;
      font-weight: 600;
    }

    .role-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .role-student { background: rgba(37, 211, 102, 0.2); color: #25d366; }
    .role-teacher { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .role-admin { background: rgba(102, 126, 234, 0.2); color: #667eea; }

    .action-icons i {
      margin: 0 5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .action-icons i:hover {
      transform: scale(1.1);
    }

    .fa-edit { color: #ffc107; }
    .fa-trash-alt { color: #ff4d4d; }

    /* مودال الإضافة والتعديل */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 30px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .modal-content h3 {
      color: white;
      margin-bottom: 20px;
    }

    .modal-content input, .modal-content select {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: white;
      font-family: 'Cairo', sans-serif;
    }

    .modal-content input:focus, .modal-content select:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-buttons {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .save-btn {
      background: linear-gradient(135deg, #25d366, #128c7e);
      color: white;
    }

    .cancel-btn {
      background: rgba(255, 77, 77, 0.8);
      color: white;
    }

    /* رسائل التنبيه */
    .toast-message {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 15px 25px;
      border-radius: 12px;
      color: white;
      z-index: 1001;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast-success { background: #25d366; }
    .toast-error { background: #ff4d4d; }
    .toast-info { background: #667eea; }

    /* أزرار التمرير */
    .scroll-btn {
      position: fixed;
      left: 20px;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s ease;
    }

    #scrollTopBtn { bottom: 80px; }
    #scrollBottomBtn { bottom: 20px; }

    @media (max-width: 768px) {
      .dashboard-header { flex-direction: column; text-align: center; }
      .stats-grid { grid-template-columns: 1fr; }
      th, td { padding: 10px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="bg-animation">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
</div>

<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="logo-area">
      <h1><i class="fas fa-crown"></i> لوحة تحكم المدير</h1>
      <p>إدارة المستخدمين والمحتوى التعليمي</p>
    </div>
    <div class="user-info">
      <span id="adminName"><i class="fas fa-user-shield"></i> المدير</span>
      <button class="back-home-btn" onclick="goToHome()"><i class="fas fa-home"></i> الرئيسية</button>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
    </div>
  </div>

  <!-- الإحصائيات -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-users" style="color: #667eea;"></i>
      <div class="stat-number" id="totalStudents">0</div>
      <div class="stat-label">إجمالي الطلاب</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-chalkboard-user" style="color: #ffc107;"></i>
      <div class="stat-number" id="totalTeachers">0</div>
      <div class="stat-label">إجمالي المعلمين</div>
    </div>
    <div class="stat-card">
      <i class="fas fa-book" style="color: #25d366;"></i>
      <div class="stat-number" id="totalCourses">0</div>
      <div class="stat-label">المقررات الدراسية</div>
    </div>
  </div>

  <!-- الإجراءات السريعة -->
  <div class="quick-actions">
    <div class="action-btn" onclick="openAddUserModal()">
      <i class="fas fa-user-plus"></i>
      <span>إضافة مستخدم جديد</span>
    </div>
    <div class="action-btn" onclick="goToStudentPage()">
      <i class="fas fa-graduation-cap"></i>
      <span>لوحة الطالب</span>
    </div>
    <div class="action-btn" onclick="goToTeacherPage()">
      <i class="fas fa-chalkboard"></i>
      <span>لوحة المعلم</span>
    </div>
    <div class="action-btn" onclick="goToHomePage()">
      <i class="fas fa-home"></i>
      <span>الصفحة الرئيسية</span>
    </div>
  </div>

  <!-- جدول الطلاب -->
  <div class="users-section">
    <div class="section-title">
      <span><i class="fas fa-user-graduate"></i> قائمة الطلاب</span>
      <button class="add-user-btn" onclick="openAddUserModal('student')"><i class="fas fa-plus"></i> إضافة طالب</button>
    </div>
    <div class="users-table">
      <table id="studentsTable">
        <thead>
        <tr><th>الاسم</th><th>البريد الإلكتروني</th><th>المرحلة</th><th>إجراءات</th></tr>
        </thead>
        <tbody id="studentsList"></tbody>
      </table>
    </div>
  </div>

  <!-- جدول المعلمين -->
  <div class="users-section">
    <div class="section-title">
      <span><i class="fas fa-chalkboard-user"></i> قائمة المعلمين</span>
      <button class="add-user-btn" onclick="openAddUserModal('teacher')"><i class="fas fa-plus"></i> إضافة معلم</button>
    </div>
    <div class="users-table">
      <table id="teachersTable">
        <thead><tr><th>الاسم</th><th>البريد الإلكتروني</th><th>التخصص</th><th>إجراءات</th></tr></thead>
        <tbody id="teachersList"></tbody>
      </table>
    </div>
  </div>
</div>

<button id="scrollTopBtn" class="scroll-btn" onclick="scrollToTop()"><i class="fas fa-arrow-up"></i></button>
<button id="scrollBottomBtn" class="scroll-btn" onclick="scrollToBottom()"><i class="fas fa-arrow-down"></i></button>

<!-- مودال إضافة/تعديل مستخدم -->
<div id="userModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">إضافة مستخدم جديد</h3>
    <input type="hidden" id="editUserId">
    <input type="text" id="userName" placeholder="الاسم الكامل">
    <input type="email" id="userEmail" placeholder="البريد الإلكتروني">
    <input type="password" id="userPassword" placeholder="كلمة المرور">
    <select id="userRole">
      <option value="student">طالب</option>
      <option value="teacher">معلم</option>
      <option value="admin">مدير</option>
    </select>
    <input type="text" id="userStage" placeholder="المرحلة الدراسية (للطلاب)">
    <div class="modal-buttons">
      <button class="save-btn" onclick="saveUser()">حفظ</button>
      <button class="cancel-btn" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
  const supabase = createClient(supabaseUrl, supabaseKey)

  let currentAdmin = null

  // التحقق من تسجيل الدخول
  async function checkAuth() {
    const userStr = localStorage.getItem('currentUser')
    if (!userStr) {
      window.location.href = 'dashboard-home.html'
      return false
    }
    currentAdmin = JSON.parse(userStr)
    if (currentAdmin.role !== 'admin') {
      window.location.href = 'dashboard-home.html'
      return false
    }
    document.getElementById('adminName').innerHTML = `<i class="fas fa-user-shield"></i> ${currentAdmin.name || 'المدير'}`
    return true
  }

  // تحميل البيانات
  async function loadData() {
    await loadUsers()
    await loadCoursesCount()
  }

  async function loadUsers() {
    const { data, error } = await supabase.from('users').select('*')
    if (error) {
      showToast('خطأ في تحميل المستخدمين', 'error')
      return
    }

    const students = data.filter(u => u.role === 'student')
    const teachers = data.filter(u => u.role === 'teacher')
    const admins = data.filter(u => u.role === 'admin')

    document.getElementById('totalStudents').innerText = students.length
    document.getElementById('totalTeachers').innerText = teachers.length

    // عرض الطلاب
    const studentsList = document.getElementById('studentsList')
    studentsList.innerHTML = students.map(s => `
      <tr>
        <td>${s.name || '-'}</td>
        <td>${s.email}</td>
        <td>${s.stage || 'غير محدد'}</td>
        <td class="action-icons">
          <i class="fas fa-edit" onclick="editUser('${s.id}')"></i>
          <i class="fas fa-trash-alt" onclick="deleteUser('${s.id}')"></i>
        </td>
      </tr>
    `).join('')

    // عرض المعلمين
    const teachersList = document.getElementById('teachersList')
    teachersList.innerHTML = teachers.map(t => `
      <tr>
        <td>${t.name || '-'}</td>
        <td>${t.email}</td>
        <td>${t.stage || 'عام'}</td>
        <td class="action-icons">
          <i class="fas fa-edit" onclick="editUser('${t.id}')"></i>
          <i class="fas fa-trash-alt" onclick="deleteUser('${t.id}')"></i>
        </td>
      </tr>
    `).join('')
  }

  async function loadCoursesCount() {
    const { data, error } = await supabase.from('courses').select('*', { count: 'exact', head: true })
    if (!error) {
      document.getElementById('totalCourses').innerText = data?.length || 0
    } else {
      document.getElementById('totalCourses').innerText = '0'
    }
  }

  // إضافة/تعديل مستخدم
  window.openAddUserModal = (role = null) => {
    document.getElementById('modalTitle').innerText = 'إضافة مستخدم جديد'
    document.getElementById('editUserId').value = ''
    document.getElementById('userName').value = ''
    document.getElementById('userEmail').value = ''
    document.getElementById('userPassword').value = ''
    document.getElementById('userStage').value = ''
    if (role) {
      document.getElementById('userRole').value = role
    } else {
      document.getElementById('userRole').value = 'student'
    }
    document.getElementById('userModal').style.display = 'flex'
  }

  window.editUser = async (userId) => {
    const { data, error } = await supabase.from('users').select('*').eq('id', userId).single()
    if (error) {
      showToast('خطأ في تحميل بيانات المستخدم', 'error')
      return
    }
    document.getElementById('modalTitle').innerText = 'تعديل بيانات المستخدم'
    document.getElementById('editUserId').value = data.id
    document.getElementById('userName').value = data.name || ''
    document.getElementById('userEmail').value = data.email
    document.getElementById('userPassword').value = ''
    document.getElementById('userRole').value = data.role
    document.getElementById('userStage').value = data.stage || ''
    document.getElementById('userModal').style.display = 'flex'
  }

  window.saveUser = async () => {
    const userId = document.getElementById('editUserId').value
    const name = document.getElementById('userName').value
    const email = document.getElementById('userEmail').value
    const password = document.getElementById('userPassword').value
    const role = document.getElementById('userRole').value
    const stage = document.getElementById('userStage').value

    if (!email) {
      showToast('البريد الإلكتروني مطلوب', 'error')
      return
    }

    if (userId) {
      // تحديث
      const updateData = { name, email, role, stage }
      if (password) updateData.password = password
      const { error } = await supabase.from('users').update(updateData).eq('id', userId)
      if (error) {
        showToast('خطأ في تحديث المستخدم', 'error')
      } else {
        showToast('تم تحديث المستخدم بنجاح', 'success')
        closeModal()
        loadUsers()
      }
    } else {
      // إضافة جديدة
      if (!password) {
        showToast('كلمة المرور مطلوبة للمستخدم الجديد', 'error')
        return
      }
      const { error } = await supabase.from('users').insert([{ name, email, password, role, stage }])
      if (error) {
        showToast('خطأ في إضافة المستخدم: ' + error.message, 'error')
      } else {
        showToast('تم إضافة المستخدم بنجاح', 'success')
        closeModal()
        loadUsers()
      }
    }
  }

  window.deleteUser = async (userId) => {
    if (confirm('هل أنت متأكد من حذف هذا المستخدم؟')) {
      const { error } = await supabase.from('users').delete().eq('id', userId)
      if (error) {
        showToast('خطأ في حذف المستخدم', 'error')
      } else {
        showToast('تم حذف المستخدم بنجاح', 'success')
        loadUsers()
      }
    }
  }

  window.closeModal = () => {
    document.getElementById('userModal').style.display = 'none'
  }

  function showToast(message, type) {
    const toast = document.createElement('div')
    toast.className = `toast-message toast-${type}`
    toast.innerHTML = message
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
  }

  window.logout = () => {
    localStorage.removeItem('currentUser')
    window.location.href = 'dashboard-home.html'
  }

  window.goToHome = () => { window.location.href = 'dashboard-home.html' }
  window.goToStudentPage = () => { window.location.href = 'student-modern.html' }
  window.goToTeacherPage = () => { window.location.href = 'teacher.html' }
  window.goToHomePage = () => { window.location.href = 'dashboard-home.html' }

  window.scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' })
  window.scrollToBottom = () => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })

  // تهيئة الصفحة
  (async () => {
    if (await checkAuth()) {
      await loadData()
    }
  })()
</script>
