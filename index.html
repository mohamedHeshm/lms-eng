<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>LMS Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>

<body class="login-body">

<div class="login-container">

  <div class="login-box-pro">

    <h2>🎓 منصة التعليم</h2>
    <p>تسجيل الدخول</p>

    <!-- Email -->
    <div class="input-group">
      <input type="email" id="email" required>
      <label>📧 الايميل</label>
    </div>

    <!-- Password -->
    <div class="input-group">
      <input type="password" id="password" required>
      <label>🔒 الباسورد</label>
    </div>

    <!-- 🔥 تعديل هنا -->
    <button id="loginBtn">🚀 دخول</button>

    <div class="footer-text">
      ✨ صنع من المهندس محمد هشام ✨
    </div>

  </div>

</div>

<!-- Scroll -->
<button id="scrollTopBtn">⬆</button>
<button id="scrollBottomBtn">⬇</button>

<script type="module">
  import { login } from "./js/app.js"

  // زر الدخول
  document.getElementById("loginBtn").onclick = login

  // Scroll
  document.getElementById("scrollTopBtn").onclick = () => {
    window.scrollTo({ top: 0, behavior: "smooth" })
  }

  document.getElementById("scrollBottomBtn").onclick = () => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" })
  }
</script>

</body>
</html>
