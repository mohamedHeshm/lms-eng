```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Modern 3D Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #0f172a;
    }

    /* 🔥 خلفية متحركة */
    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(270deg, #667eea, #764ba2, #00c6ff);
      background-size: 600% 600%;
      animation: gradientMove 12s ease infinite;
      filter: blur(80px);
    }

    @keyframes gradientMove {
      0% { background-position: 0% }
      50% { background-position: 100% }
      100% { background-position: 0% }
    }

    /* 📦 الكونتينر */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    /* 🎯 الكارت */
    .login-box-pro {
      width: 320px;
      padding: 30px;
      border-radius: 20px;

      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);

      box-shadow: 0 20px 60px rgba(0,0,0,0.5);

      text-align: center;
      color: white;

      transition: transform 0.2s ease;
    }

    .login-box-pro h2 {
      margin-bottom: 10px;
    }

    /* 🔥 Inputs */
    .input-group {
      position: relative;
      margin: 20px 0;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: none;
      outline: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .input-group label {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      color: #ccc;
      transition: 0.3s;
      pointer-events: none;
    }

    .input-group input:focus + label,
    .input-group input:valid + label {
      top: -10px;
      font-size: 12px;
      color: #00c6ff;
    }

    /* 🚀 زر */
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;

      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;

      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00c6ff;
    }

    #loginStatus {
      margin-top: 10px;
      color: #ff4d4d;
    }

    .footer-text {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="login-container">
  <div class="login-box-pro" id="card">

    <h2>🎓 Al-Ma'moun 🎓</h2>
    <p>تسجيل الدخول</p>

    <div class="input-group">
      <input type="email" id="email" required>
      <label>📧 الايميل</label>
    </div>

    <div class="input-group">
      <input type="password" id="password" required>
      <label>🔒 الباسورد</label>
    </div>

    <button onclick="handleLogin()" id="loginBtn">دخول</button>

    <p id="loginStatus"></p>

    <div class="footer-text">
      Developer by Eng Mohamed Hesham 👨🏻‍💻
    </div>

  </div>
</div>

<script>
  // 🎯 3D Effect
  const card = document.getElementById("card")

  document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 25
    let y = (window.innerHeight / 2 - e.pageY) / 25

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`
  })

  // 🔥 Login
  async function handleLogin() {
    let btn = document.getElementById("loginBtn")
    let status = document.getElementById("loginStatus")

    btn.disabled = true
    btn.innerText = "⏳ جاري..."
    status.innerText = ""

    try {
      if (window.login) {
        await window.login()
      } else {
        throw new Error("login() مش موجودة")
      }
    } catch (e) {
      status.innerText = "❌ " + e.message
    }

    btn.disabled = false
    btn.innerText = "دخول"
  }

  // 🔥 Enter للدخول
  document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      handleLogin()
    }
  })
</script>

</body>
</html>
