<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎓 Al-Ma'moun • تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: #06061a;
      color: #fff;
      perspective: 1500px;
    }

    /* ============ خلفية ثلاثية الأبعاد ============ */
    .scene {
      position: fixed;
      inset: 0;
      transform-style: preserve-3d;
      z-index: 0;
    }

    /* شبكة 3D متحركة */
    .grid-3d {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(102,126,234,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102,126,234,0.18) 1px, transparent 1px);
      background-size: 60px 60px;
      transform: perspective(800px) rotateX(60deg) translateZ(-100px) translateY(20%);
      transform-origin: center bottom;
      animation: gridMove 25s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0; }
      to { background-position: 0 600px; }
    }

    /* كرات ضوئية عائمة */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.7;
      animation: float3d 14s ease-in-out infinite;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #667eea, transparent 70%);
      top: -150px; right: -150px;
    }

    .orb-2 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #f5576c, transparent 70%);
      bottom: -150px; left: -150px;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #00f2fe, transparent 70%);
      top: 50%; left: 30%;
      animation-delay: -10s;
    }

    @keyframes float3d {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      33% { transform: translate3d(60px, -80px, 100px) scale(1.15); }
      66% { transform: translate3d(-40px, 50px, -60px) scale(0.9); }
    }

    /* جزيئات صغيرة طايرة */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px white, 0 0 20px #667eea;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      from { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }

    /* ============ الحاوية الرئيسية ============ */
    .login-wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transform-style: preserve-3d;
    }

    /* الكارت الزجاجي ثلاثي الأبعاد */
    .login-card {
      position: relative;
      width: 100%;
      max-width: 440px;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      box-shadow:
        0 25px 80px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        0 0 0 1px rgba(102, 126, 234, 0.1);
      transform-style: preserve-3d;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEntry 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardEntry {
      from {
        opacity: 0;
        transform: rotateX(-30deg) translateY(80px) scale(0.8);
      }
      to {
        opacity: 1;
        transform: rotateX(0) translateY(0) scale(1);
      }
    }

    /* حواف ضوئية متحركة */
    .login-card::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 28px;
      padding: 2px;
      background: linear-gradient(135deg,
        #667eea, #764ba2, #f093fb, #f5576c, #4facfe, #667eea);
      background-size: 400% 400%;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
      animation: borderGlow 6s ease infinite;
      pointer-events: none;
    }

    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ============ الشعار + العنوان ============ */
    .logo-3d {
      width: 90px;
      height: 90px;
      margin: 0 auto 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 25px;
      box-shadow:
        0 15px 40px rgba(102, 126, 234, 0.5),
        inset 0 -5px 15px rgba(0, 0, 0, 0.2),
        inset 0 5px 15px rgba(255, 255, 255, 0.2);
      transform: rotateY(0) rotateX(0);
      transform-style: preserve-3d;
      animation: logoSpin 8s ease-in-out infinite;
      cursor: pointer;
      transition: transform 0.4s;
    }

    .logo-3d:hover {
      transform: rotateY(360deg) scale(1.1);
    }

    @keyframes logoSpin {
      0%, 100% { transform: rotateY(0) translateZ(0); }
      50% { transform: rotateY(180deg) translateZ(20px); }
    }

    .login-card h2 {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 0%, #b8c5ff 50%, #f093fb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .login-card .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
      margin-bottom: 35px;
      font-weight: 300;
    }

    /* ============ حقول الإدخال ============ */
    .input-group {
      position: relative;
      margin-bottom: 22px;
    }

    .input-group input {
      width: 100%;
      padding: 18px 50px 18px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-group input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #667eea;
      box-shadow:
        0 0 0 4px rgba(102, 126, 234, 0.15),
        0 10px 30px rgba(102, 126, 234, 0.2);
      transform: translateY(-2px);
    }

    .input-group input::placeholder { color: transparent; }

    .input-group label {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 15px;
      pointer-events: none;
      transition: all 0.3s ease;
      background: transparent;
      padding: 0 8px;
    }

    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label {
      top: 0;
      font-size: 12px;
      color: #b8c5ff;
      background: linear-gradient(180deg, transparent 50%, #1a0f3f 50%);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      opacity: 0.5;
      transition: 0.3s;
    }

    .input-group input:focus ~ .input-icon {
      opacity: 1;
      transform: translateY(-50%) scale(1.2);
    }

    /* ============ زرار الدخول ============ */
    .login-btn {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 200% 200%;
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 15px 35px rgba(102, 126, 234, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 1px;
    }

    .login-btn:hover:not(:disabled) {
      background-position: 100% 0;
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 20px 50px rgba(102, 126, 234, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: 0.5s;
    }

    .login-btn:hover::before { left: 100%; }

    /* رسائل الحالة */
    #loginStatus {
      text-align: center;
      margin-top: 18px;
      min-height: 22px;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s;
    }

    /* زرار الرجوع */
    .back-btn {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
    }

    /* ============ أيقونات عصرية ثلاثية الأبعاد عائمة حول الكارت ============ */
    .floating-icon {
      position: absolute;
      font-size: 28px;
      opacity: 0.4;
      animation: floatIcon 6s ease-in-out infinite;
      filter: drop-shadow(0 5px 15px rgba(102,126,234,0.5));
    }

    .icon-1 { top: 10%; left: 8%; animation-delay: 0s; }
    .icon-2 { top: 20%; right: 10%; animation-delay: -1.5s; }
    .icon-3 { bottom: 25%; left: 5%; animation-delay: -3s; }
    .icon-4 { bottom: 15%; right: 8%; animation-delay: -4.5s; }
    .icon-5 { top: 50%; left: 12%; animation-delay: -2s; }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(15deg); }
    }

    @media (max-width: 480px) {
      .login-card { padding: 40px 25px; }
      .login-card h2 { font-size: 26px; }
      .floating-icon { display: none; }
    }
  </style>
</head>
<body>

<!-- مشهد الخلفية ثلاثي الأبعاد -->
<div class="scene">
  <div class="grid-3d"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- جزيئات متحركة -->
<div id="particles"></div>

<!-- أيقونات عائمة -->
<div class="floating-icon icon-1">📚</div>
<div class="floating-icon icon-2">🎓</div>
<div class="floating-icon icon-3">✨</div>
<div class="floating-icon icon-4">🚀</div>
<div class="floating-icon icon-5">💡</div>

<div class="login-wrapper">
  <div class="login-card" id="loginCard">

    <div class="logo-3d">🎓</div>
    <h2>Al-Ma'moun</h2>
    <p class="subtitle">منصة التعليم الذكية • سجّل الدخول لتبدأ</p>

    <div class="input-group">
      <input type="email" id="email" placeholder=" " autocomplete="email">
      <label>البريد الإلكتروني</label>
      <span class="input-icon">📧</span>
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder=" " autocomplete="current-password">
      <label>كلمة المرور</label>
      <span class="input-icon">🔒</span>
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">
      ✨ تسجيل الدخول
    </button>

    <p id="loginStatus"></p>

    <button class="back-btn" onclick="window.location.href='dashboard-home.html'">
      🏠 الرجوع للرئيسية
    </button>

    <div class="footer-text">
      Developed by Eng Mohamed Hesham 👨🏻‍💻
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

<script>
  // إنشاء الجزيئات الطائرة
  (function createParticles() {
    const container = document.getElementById('particles')
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div')
      p.className = 'particle'
      p.style.left = Math.random() * 100 + '%'
      p.style.animationDuration = (8 + Math.random() * 12) + 's'
      p.style.animationDelay = Math.random() * 10 + 's'
      container.appendChild(p)
    }
  })()

  // تأثير 3D Tilt على الكارت
  const card = document.getElementById('loginCard')
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 12
    const y = (e.clientY / window.innerHeight - 0.5) * -12
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`
  })
  document.addEventListener('mouseleave', () => {
    card.style.transform = 'rotateY(0) rotateX(0)'
  })

  // معالج تسجيل الدخول
  async function handleLogin() {
    const btn = document.getElementById("loginBtn")
    const status = document.getElementById("loginStatus")
    btn.disabled = true
    btn.innerHTML = "⏳ جاري التحقق..."
    status.innerText = ""
    try {
      await window.login()
    } catch (e) {
      status.innerText = "❌ حصل خطأ: " + e.message
      status.style.color = "#ff6b6b"
    }
    btn.disabled = false
    btn.innerHTML = "✨ تسجيل الدخول"
  }
  window.handleLogin = handleLogin

  document.addEventListener("keypress", (e) => {
    if (e.key === "Enter") handleLogin()
  })
</script>

</body>
</html>
