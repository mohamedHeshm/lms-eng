<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المدرس - منصة التعليم</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    .main-content { margin-left: 260px; padding: var(--space-lg); }
    .hero-section { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: var(--space-2xl); border-radius: var(--border-radius-lg); margin-bottom: var(--space-xl); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-lg); margin-bottom: var(--space-xl); }
    .stat-box { background: white; padding: var(--space-xl); border-radius: var(--border-radius-lg); text-align: center; box-shadow: var(--shadow-md); }
    .stat-value { font-size: 32px; font-weight: bold; color: var(--primary); }
    .stat-label { color: var(--text-secondary); margin-top: 10px; }
    @media (max-width: 768px) { .main-content { margin-left: 0; } }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">👨‍🏫</div>
    <div class="sidebar-brand">المدرس</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active"><span class="nav-icon">📊</span><span>لوحة التحكم</span></div>
    <div class="nav-item"><span class="nav-icon">📚</span><span>الكورسات</span></div>
    <div class="nav-item"><span class="nav-icon">✅</span><span>الواجبات</span></div>
    <div class="nav-item"><span class="nav-icon">📝</span><span>التصحيح</span></div>
    <div class="nav-item"><span class="nav-icon">👥</span><span>الطلاب</span></div>
    <div class="nav-item"><span class="nav-icon">📊</span><span>التقارير</span></div>
    <div class="nav-item" style="margin-top: auto; color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></div>
  </div>
</nav>

<!-- Navbar -->
<nav class="navbar">
  <button class="navbar-toggle">☰</button>
  <div class="search-box"><span class="search-icon">🔍</span><input type="text" placeholder="ابحث عن كورس أو طالب..."></div>
  <div class="navbar-spacer"></div>
  <div class="navbar-actions">
    <div class="notification-badge"><span style="font-size: 18px;">🔔</span><div class="notification-dot"></div></div>
    <div class="user-menu">
      <div class="user-avatar">م</div>
      <div style="font-size: 14px;"><div style="font-weight: 600;">محمد علي</div><div style="font-size: 12px; color: var(--text-tertiary);">معلم</div></div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main-content">
  <section class="hero-section">
    <h1>مرحباً بعودتك، محمد 👋</h1>
    <p>إدارة كورساتك وتقيّم طلابك بسهولة</p>
  </section>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-box">
      <div style="font-size: 32px; margin-bottom: 10px;">📚</div>
      <div class="stat-value" id="courseCount">5</div>
      <div class="stat-label">كورسات نشطة</div>
    </div>
    <div class="stat-box">
      <div style="font-size: 32px; margin-bottom: 10px;">👥</div>
      <div class="stat-value" id="studentCount">234</div>
      <div class="stat-label">إجمالي الطلاب</div>
    </div>
    <div class="stat-box">
      <div style="font-size: 32px; margin-bottom: 10px;">✅</div>
      <div class="stat-value" id="assignmentCount">12</div>
      <div class="stat-label">واجبات قيد المراجعة</div>
    </div>
    <div class="stat-box">
      <div style="font-size: 32px; margin-bottom: 10px;">📊</div>
      <div class="stat-value">4.8</div>
      <div class="stat-label">تقييم الطلاب</div>
    </div>
  </div>

  <!-- Content Grid -->
  <div style="display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-lg);">
    <!-- Recent Activity -->
    <div class="card">
      <div class="card-header"><h3>📋 آخر النشاطات</h3></div>
      <div class="card-body" id="activityContainer">
        <div class="skeleton" style="height: 60px; margin-bottom: 10px;"></div>
        <div class="skeleton" style="height: 60px;"></div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card-header"><h3>⚡ إجراءات سريعة</h3></div>
      <div class="card-body">
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">➕ كورس جديد</button>
        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 10px;">➕ واجب جديد</button>
        <button class="btn btn-success" style="width: 100%;">📊 عرض التقارير</button>
      </div>
    </div>
  </div>
</main>

<script type="module">
  import AuthService from '../js/auth.js';
  
  if (!AuthService.isAuthenticated()) {
    window.location.href = 'login.html';
  }
  
  const user = AuthService.getCurrentUser();
  if (user.role !== 'teacher') {
    window.location.href = 'login.html';
  }

  // Simulate data loading
  setTimeout(() => {
    document.getElementById('activityContainer').innerHTML = `
      <div style="padding: 10px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 10px;">
        <div style="font-weight: 600;">علاء سلّم واجب الرياضيات</div>
        <div style="font-size: 12px; color: var(--text-tertiary);">قبل 5 دقائق</div>
      </div>
      <div style="padding: 10px; background: var(--bg-secondary); border-radius: 8px;">
        <div style="font-weight: 600;">3 طلاب انضموا للكورس</div>
        <div style="font-size: 12px; color: var(--text-tertiary);">قبل ساعة</div>
      </div>
    `;
  }, 500);
</script>

</body>
</html>
