<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قوائم التشغيل - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Cairo', sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
        }

        .container {
          max-width: 1000px;
          margin: 0 auto;
        }

        .header {
          background: white;
          border-radius: 20px;
          padding: 30px;
          text-align: center;
          margin-bottom: 30px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
          color: #667eea;
          font-size: 2rem;
        }

        .card {
          background: white;
          border-radius: 20px;
          padding: 30px;
          margin-bottom: 30px;
          box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
          color: #667eea;
          margin-bottom: 20px;
        }

        input, select {
          width: 100%;
          padding: 12px 15px;
          margin: 10px 0;
          border-radius: 12px;
          border: 2px solid #e0e0e0;
          font-family: 'Cairo', sans-serif;
          font-size: 1rem;
        }

        input:focus, select:focus {
          outline: none;
          border-color: #667eea;
        }

        button {
          width: 100%;
          padding: 12px;
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: white;
          border: none;
          border-radius: 12px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          transition: transform 0.2s;
          margin-top: 10px;
        }

        button:hover {
          transform: translateY(-2px);
        }

        .btn-back {
          background: #6c757d;
          margin-bottom: 20px;
        }

        .playlist-card {
          background: #f8f9fa;
          border-radius: 15px;
          padding: 20px;
          margin-bottom: 20px;
        }

        .video-item {
          background: white;
          padding: 10px;
          margin: 10px 0;
          border-radius: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
        }

        .delete-btn {
          background: #ff5252;
          width: auto;
          padding: 5px 15px;
          margin: 0;
        }

        .back-link {
          display: inline-block;
          margin-bottom: 20px;
          color: white;
          text-decoration: none;
          background: rgba(255,255,255,0.2);
          padding: 10px 20px;
          border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="teacher.html" class="back-link">← رجوع إلى لوحة المدرس</a>

    <div class="header">
        <h1>🎬 إدارة قوائم التشغيل</h1>
        <p>أنشئ قوائم تشغيل وأضف فيديوهات YouTube</p>
    </div>

    <div class="card">
        <h3>➕ إنشاء قائمة تشغيل جديدة</h3>
        <input type="text" id="playlistName" placeholder="اسم القائمة (مثال: شرح الجبر)">
        <input type="number" id="playlistPrice" placeholder="السعر (جنيه)">
        <button onclick="window.createPlaylist()">إنشاء القائمة</button>
    </div>

    <div class="card">
        <h3>📋 قوائم التشغيل الحالية</h3>
        <div id="playlistsList">
            <p style="text-align:center; color:#999;">جاري التحميل...</p>
        </div>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
