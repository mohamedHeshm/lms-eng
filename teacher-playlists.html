<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قوائم التشغيل - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Cairo', sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
        }

        .container {
          max-width: 1200px;
          margin: 0 auto;
        }

        .header {
          background: white;
          border-radius: 20px;
          padding: 30px;
          text-align: center;
          margin-bottom: 30px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
          color: #667eea;
          font-size: 2rem;
        }

        .card {
          background: white;
          border-radius: 20px;
          padding: 30px;
          margin-bottom: 30px;
          box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
          color: #667eea;
          margin-bottom: 20px;
        }

        input, select, textarea {
          width: 100%;
          padding: 12px 15px;
          margin: 10px 0;
          border-radius: 12px;
          border: 2px solid #e0e0e0;
          font-family: 'Cairo', sans-serif;
          font-size: 1rem;
        }

        input:focus, select:focus, textarea:focus {
          outline: none;
          border-color: #667eea;
        }

        button {
          width: 100%;
          padding: 12px;
          background: linear-gradient(135deg, #667eea, #764ba2);
          color: white;
          border: none;
          border-radius: 12px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          transition: transform 0.2s;
          margin-top: 10px;
        }

        button:hover {
          transform: translateY(-2px);
        }

        .btn-back {
          background: #6c757d;
          margin-bottom: 20px;
          width: auto;
          padding: 10px 25px;
        }

        .playlist-card {
          background: #f8f9fa;
          border-radius: 15px;
          padding: 20px;
          margin-bottom: 20px;
          border-right: 5px solid #667eea;
        }

        .playlist-header {
          display: flex;
          gap: 20px;
          margin-bottom: 20px;
          flex-wrap: wrap;
        }

        .playlist-thumbnail {
          width: 150px;
          height: 150px;
          border-radius: 15px;
          object-fit: cover;
          background: linear-gradient(135deg, #667eea, #764ba2);
          border: 3px solid white;
          box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .playlist-info {
          flex: 1;
        }

        .thumbnail-upload {
          display: flex;
          gap: 10px;
          align-items: center;
          margin-top: 10px;
          flex-wrap: wrap;
        }

        .thumbnail-upload input {
          flex: 1;
          margin: 0;
        }

        .thumbnail-upload button {
          width: auto;
          margin: 0;
          padding: 10px 20px;
        }

        .video-item {
          background: white;
          padding: 10px;
          margin: 10px 0;
          border-radius: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
        }

        .delete-btn {
          background: #ff5252;
          width: auto;
          padding: 5px 15px;
          margin: 0;
        }

        .back-link {
          display: inline-block;
          margin-bottom: 20px;
          color: white;
          text-decoration: none;
          background: rgba(255,255,255,0.2);
          padding: 10px 20px;
          border-radius: 10px;
        }

        .current-thumb {
          margin-top: 10px;
          font-size: 12px;
          color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="teacher.html" class="back-link">← رجوع إلى لوحة المدرس</a>

    <div class="header">
        <h1>🎬 إدارة قوائم التشغيل</h1>
        <p>أنشئ قوائم تشغيل وأضف فيديوهات YouTube وصورة مميزة لكل قائمة</p>
    </div>

    <div class="card">
        <h3>➕ إنشاء قائمة تشغيل جديدة</h3>
        <input type="text" id="playlistName" placeholder="اسم القائمة (مثال: شرح الجبر)">
        <input type="number" id="playlistPrice" placeholder="السعر (جنيه)">
        <input type="file" id="playlistThumbnail" accept="image/*">
        <button onclick="window.createPlaylist()">إنشاء القائمة</button>
    </div>

    <div class="card">
        <h3>📋 قوائم التشغيل الحالية</h3>
        <div id="playlistsList">
            <p style="text-align:center; color:#999;">جاري التحميل...</p>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
    const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
    const supabase = createClient(supabaseUrl, supabaseKey)

    function getCurrentUser() {
      try {
        const userJson = localStorage.getItem("currentUser")
        return userJson ? JSON.parse(userJson) : null
      } catch (e) {
        return null
      }
    }

    function escapeHtml(text) {
      if (!text) return ''
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    function convertToEmbed(url) {
      if (url.includes("watch?v=")) return url.replace("watch?v=", "embed/")
      if (url.includes("youtu.be/")) {
        let id = url.split("youtu.be/")[1].split("?")[0]
        return "https://www.youtube.com/embed/" + id
      }
      return url
    }

    // إنشاء قائمة تشغيل جديدة مع صورة
    window.createPlaylist = async function() {
      try {
        let name = document.getElementById("playlistName")?.value.trim()
        let price = document.getElementById("playlistPrice")?.value.trim()
        let thumbnailFile = document.getElementById("playlistThumbnail")?.files[0]
        let currentUser = getCurrentUser()

        if (!name) return alert("❗ اكتب اسم القائمة")
        if (!price && price !== "0") return alert("❗ اكتب سعر القائمة (0 لو مجاني)")
        if (!currentUser || currentUser.role !== "teacher") return alert("❌ لازم تكون مدرس")

        let thumbnailUrl = null

        // رفع الصورة إذا وجدت
        if (thumbnailFile) {
          const ext = thumbnailFile.name.split('.').pop()
          const path = `playlist_thumbnails/${currentUser.id}_${Date.now()}.${ext}`
          const { error: uploadError } = await supabase.storage.from("files").upload(path, thumbnailFile)
          if (uploadError) {
            console.error("Upload error:", uploadError)
            alert("❌ خطأ في رفع الصورة: " + uploadError.message)
            return
          }
          const { data: urlData } = supabase.storage.from("files").getPublicUrl(path)
          thumbnailUrl = urlData.publicUrl
        }

        const { error } = await supabase.from("playlists").insert([{
          teacher_id: currentUser.id,
          teacher_name: currentUser.name,
          name: name,
          price: parseFloat(price) || 0,
          thumbnail_url: thumbnailUrl
        }])

        if (error) {
          console.error("Create playlist error:", error)
          return alert("❌ خطأ: " + error.message)
        }

        document.getElementById("playlistName").value = ""
        document.getElementById("playlistPrice").value = ""
        document.getElementById("playlistThumbnail").value = ""
        alert("✅ تم إنشاء قائمة التشغيل")
        loadMyPlaylists()
      } catch (e) {
        console.error(e)
        alert("❌ خطأ: " + e.message)
      }
    }

    // تحديث صورة قائمة التشغيل
    window.updatePlaylistThumbnail = async function(playlistId) {
      const fileInput = document.getElementById(`thumb_${playlistId}`)
      const file = fileInput?.files[0]

      if (!file) {
        alert("❗ اختر صورة أولاً")
        return
      }

      const currentUser = getCurrentUser()
      if (!currentUser) return

      const ext = file.name.split('.').pop()
      const path = `playlist_thumbnails/${currentUser.id}_${playlistId}_${Date.now()}.${ext}`

      const { error: uploadError } = await supabase.storage.from("files").upload(path, file)
      if (uploadError) {
        alert("❌ خطأ في رفع الصورة: " + uploadError.message)
        return
      }

      const { data: urlData } = supabase.storage.from("files").getPublicUrl(path)

      const { error: updateError } = await supabase
        .from("playlists")
        .update({ thumbnail_url: urlData.publicUrl })
        .eq("id", playlistId)

      if (updateError) {
        alert("❌ خطأ في تحديث الصورة: " + updateError.message)
        return
      }

      alert("✅ تم تحديث صورة القائمة")
      loadMyPlaylists()
    }

    // تحميل قوائم المدرس الحالي
    window.loadMyPlaylists = async function() {
      let container = document.getElementById("playlistsList")
      if (!container) return
      let currentUser = getCurrentUser()
      if (!currentUser) return

      container.innerHTML = "<p style='text-align:center; color:#999;'>⏳ جاري التحميل...</p>"

      let { data: playlists, error } = await supabase
        .from("playlists")
        .select("*")
        .eq("teacher_id", currentUser.id)
        .order("id", { ascending: false })

      if (error) {
        container.innerHTML = `<div style="background:#fff3cd; border:2px solid #ffc107; padding:20px; border-radius:12px; color:#856404;">
          <h4>⚠️ تعذّر تحميل القوائم</h4>
          <p>${escapeHtml(error.message)}</p>
        </div>`
        return
      }

      if (!playlists || playlists.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#999;'>📭 لا توجد قوائم بعد. أنشئ أول قائمة من فوق.</p>"
        return
      }

      let { data: allVideos } = await supabase
        .from("playlist_videos")
        .select("*")
        .in("playlist_id", playlists.map(p => p.id))
        .order("id", { ascending: true })

      container.innerHTML = ""
      for (const p of playlists) {
        let vids = (allVideos || []).filter(v => v.playlist_id === p.id)
        let vidsHtml = vids.length === 0
          ? "<p style='color:#999; font-size:13px;'>(لا فيديوهات بعد)</p>"
          : vids.map(v => `
            <div class="video-item">
              <span>🎥 ${escapeHtml(v.title || "بدون عنوان")}</span>
              <button onclick="window.deletePlaylistVideo('${v.id}', '${p.id}')" class="delete-btn">🗑</button>
            </div>`).join("")

        container.innerHTML += `
          <div class="playlist-card">
            <div class="playlist-header">
              ${p.thumbnail_url ?
                `<img src="${escapeHtml(p.thumbnail_url)}" class="playlist-thumbnail" alt="thumbnail">` :
                `<div class="playlist-thumbnail" style="display:flex; align-items:center; justify-content:center; font-size:50px;">🎬</div>`
              }
              <div class="playlist-info">
                <h3 style="color:#667eea;">📺 ${escapeHtml(p.name)}</h3>
                <p style="color:#666;">💰 السعر: <strong>${p.price > 0 ? p.price + " جنيه" : "مجاني"}</strong></p>

                <div class="thumbnail-upload">
                  <input type="file" id="thumb_${p.id}" accept="image/*">
                  <button onclick="window.updatePlaylistThumbnail('${p.id}')">🖼 تغيير الصورة</button>
                </div>
                ${p.thumbnail_url ? `<p class="current-thumb">✅ صورة حالية: ${p.thumbnail_url.substring(p.thumbnail_url.lastIndexOf('/') + 1)}</p>` : ''}
              </div>
            </div>

            <div style="background:white; padding:15px; border-radius:10px; margin-bottom:15px;">
              <h4 style="margin-bottom:10px; color:#333;">➕ إضافة فيديو</h4>
              <input type="text" id="vt_${p.id}" placeholder="عنوان الفيديو">
              <input type="text" id="vu_${p.id}" placeholder="رابط YouTube">
              <button onclick="window.addPlaylistVideo('${p.id}')">➕ إضافة فيديو</button>
            </div>

            <h4 style="margin:10px 0; color:#333;">🎬 فيديوهات القائمة (${vids.length})</h4>
            ${vidsHtml}

            <button onclick="window.deletePlaylist('${p.id}')" style="background:#ff5252; margin-top:15px;">🗑 حذف القائمة كاملة</button>
          </div>`
      }
    }

    // إضافة فيديو لقائمة
    window.addPlaylistVideo = async function(playlistId) {
      let title = document.getElementById("vt_" + playlistId)?.value.trim()
      let url = document.getElementById("vu_" + playlistId)?.value.trim()
      if (!title || !url) return alert("❗ اكتب العنوان والرابط")

      let { error } = await supabase.from("playlist_videos").insert([{
        playlist_id: playlistId,
        title: title,
        url: convertToEmbed(url)
      }])

      if (error) return alert("❌ خطأ: " + error.message)
      alert("✅ تم إضافة الفيديو")
      loadMyPlaylists()
    }

    // حذف فيديو
    window.deletePlaylistVideo = async function(videoId, playlistId) {
      if (!confirm("حذف هذا الفيديو؟")) return
      let { error } = await supabase.from("playlist_videos").delete().eq("id", videoId)
      if (error) return alert("❌ " + error.message)
      loadMyPlaylists()
    }

    // حذف قائمة كاملة
    window.deletePlaylist = async function(id) {
      if (!confirm("⚠️ سيتم حذف القائمة وكل فيديوهاتها. متأكد؟")) return
      await supabase.from("playlist_videos").delete().eq("playlist_id", id)
      let { error } = await supabase.from("playlists").delete().eq("id", id)
      if (error) return alert("❌ " + error.message)
      alert("✅ تم الحذف")
      loadMyPlaylists()
    }

    // تحميل البيانات
    window.addEventListener("load", () => {
      loadMyPlaylists()
    })
</script>
</body>
</html>
