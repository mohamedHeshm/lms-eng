<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard">
<div class="container">

  <h2>👨‍🎓 لوحة الطالب</h2>

  <div class="tabs">
    <button onclick="window.openTab('profile')">👤 المدرس</button>
    <button onclick="window.openTab('social')">🔗 التواصل</button>
    <button onclick="window.openTab('videosTab')">🎥 الفيديوهات</button>
    <button onclick="window.openTab('pdfsTab')">📁 الواجبات</button>
    <button onclick="window.openTab('pdfs2Tab')">📁 المذكرات</button>
    <button onclick="window.openTab('notesTab')">📝 التنبيهات</button>
    <button onclick="window.goToTeacherProfile()" style="background:#ff6b35; color:white;">⭐ التقييم</button>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="tab-content">
    <div class="card teacher-profile-card" id="teacherProfile">
      <p style="text-align:center;color:#aaa;">⏳ جاري التحميل...</p>
    </div>
  </div>

  <!-- SOCIAL -->
  <div id="social" class="tab-content">
    <div class="card" id="teacherSocial">
      <p style="text-align:center;color:#aaa;">⏳ جاري التحميل...</p>
    </div>
  </div>

  <!-- VIDEOS -->
  <div id="videosTab" class="tab-content">
    <div class="card">
      <h3>🎥 الفيديوهات</h3>
      <div id="videoContainer"></div>
    </div>
  </div>

  <!-- PDF الأول -->
  <div id="pdfsTab" class="tab-content">
    <div class="card">
      <h3>📁 الواجبات</h3>
      <ul id="pdfList"></ul>
    </div>

    <!-- رفع الحل -->
    <div class="card" style="margin-top:15px;">
      <h3>📤 تسليم الواجب</h3>
      <input type="file" id="solutionFile">
      <button onclick="window.uploadSolution()" style="width:100%; margin-top:10px;">رفع الحل</button>
      <p id="uploadStatus" style="text-align:center; margin-top:10px; font-weight:600;"></p>
    </div>
  </div>

  <!-- PDF الثاني -->
  <div id="pdfs2Tab" class="tab-content">
    <div class="card">
      <h3>📁 المذكرات</h3>
      <ul id="pdfList2"></ul>
    </div>
  </div>

  <!-- NOTES -->
  <div id="notesTab" class="tab-content">
    <div class="card">
      <h3>📝 التنبيهات</h3>
      <ul id="noteList"></ul>
    </div>
  </div>

  <button class="logout" onclick="window.logout()">تسجيل خروج</button>
</div>

<script type="module" src="js/app.js"></script>

<button id="scrollTopBtn" onclick="window.scrollToTop()">⬆</button>
<button id="scrollBottomBtn" onclick="window.scrollToBottom()">⬇</button>

</body>
</html>
