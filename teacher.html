<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard">
<div class="container">

  <h2>👨‍🏫 لوحة المدرس</h2>

  <!-- زرار الحلول -->
  <div style="margin-bottom:15px;">
    <button onclick="openTab('solutions')" style="background:#ff6b35;font-size:16px;padding:12px;">
      📥 حلول الطلاب
    </button>
  </div>

  <div class="tabs">
    <button onclick="openTab('profile')">👤 البروفايل</button>
    <button onclick="openTab('social')">🔗 التواصل</button>
    <button onclick="openTab('video')">🎥 فيديو</button>
    <button onclick="openTab('pdf')">📁 PDF 1</button>
    <button onclick="openTab('pdf2')">📁 PDF 2</button>
    <button onclick="openTab('note')">📝 ملاحظات</button>
  </div>

  <!-- PROFILE -->
  <div id="profile" class="tab-content">
    <div class="card">
      <h3>👤 صفحتي</h3>
      <div id="profilePreview"></div>
      <input type="text" id="bio" placeholder="عرف نفسك">
      <input type="file" id="imgFile" accept="image/*">
      <p id="profileStatus"></p>
      <button onclick="saveProfile()">حفظ</button>
    </div>
  </div>

  <!-- SOCIAL -->
  <div id="social" class="tab-content">
    <div class="card">
      <h3>🔗 روابط التواصل</h3>
      <input type="text" id="facebook" placeholder="رابط فيسبوك">
      <input type="text" id="whatsapp" placeholder="رابط واتساب">
      <input type="text" id="youtube" placeholder="رابط يوتيوب">
      <button onclick="saveSocial()">حفظ</button>
    </div>
  </div>

  <!-- VIDEO -->
  <div id="video" class="tab-content">
    <div class="card">
      <h3>🎥 نشر فيديو</h3>
      <input type="text" id="videoInput" placeholder="رابط الفيديو">
      <button onclick="addVideo()">نشر</button>
    </div>
    <div class="card" style="margin-top:15px;">
      <h3>📋 الفيديوهات المنشورة</h3>
      <div id="videoListTeacher"></div>
    </div>
  </div>

  <!-- PDF الأول -->
  <div id="pdf" class="tab-content">
    <div class="card">
      <h3>📁 رفع PDF (الأول)</h3>
      <input type="file" id="pdfFile" accept="application/pdf">
      <button onclick="uploadPDF()">رفع</button>
      <p id="status"></p>
    </div>
    <div class="card" style="margin-top:15px;">
      <h3>📋 الملفات المرفوعة</h3>
      <div id="pdfListTeacher"></div>
    </div>
  </div>

  <!-- PDF الثاني -->
  <div id="pdf2" class="tab-content">
    <div class="card">
      <h3>📁 رفع PDF (الثاني)</h3>
      <input type="file" id="pdf2File" accept="application/pdf">
      <button onclick="uploadPDF2()">رفع</button>
      <p id="status2"></p>
    </div>
    <div class="card" style="margin-top:15px;">
      <h3>📋 الملفات المرفوعة</h3>
      <!-- 🔥 تم تصحيح الـ id هنا -->
      <div id="pdfListTeacher2"></div>
    </div>
  </div>

  <!-- NOTE -->
  <div id="note" class="tab-content">
    <div class="card">
      <h3>📝 نشر ملاحظة</h3>
      <input type="text" id="noteInput" placeholder="اكتب ملاحظة">
      <button onclick="addNote()">نشر</button>
    </div>
    <div class="card" style="margin-top:15px;">
      <h3>📋 الملاحظات المنشورة</h3>
      <div id="noteListTeacher"></div>
    </div>
  </div>

  <!-- SOLUTIONS -->
  <div id="solutions" class="tab-content">
    <div class="card">
      <h3>📥 حلول الطلاب</h3>
      <div id="solutionsList"></div>
    </div>
  </div>

  <button class="logout" onclick="logout()">تسجيل خروج</button>
</div>

<script type="module" src="js/app.js"></script>

<button id="scrollTopBtn" onclick="scrollToTop()">⬆</button>
<button id="scrollBottomBtn" onclick="scrollToBottom()">⬇</button>

</body>
</html>
