<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard - Complete</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
      overflow-x: hidden;
    }

    /* ==================== LAYOUT ==================== */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* ==================== SIDEBAR ==================== */
    .sidebar {
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      position: fixed;
      left: 0;
      top: 0;
      width: 280px;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 10px 0 40px rgba(0, 0, 0, 0.3);
      z-index: 50;
      backdrop-filter: blur(10px);
    }

    .sidebar h2 {
      font-size: 26px;
      margin-bottom: 30px;
      text-align: center;
      border-bottom: 3px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .sidebar-section {
      margin-bottom: 30px;
    }

    .sidebar-title {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .menu-btn {
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.7);
      transform: translateX(5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .menu-btn:hover::before {
      left: 100%;
    }

    .menu-btn.active {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-color: white;
      box-shadow: 0 8px 30px rgba(245, 87, 108, 0.5);
      transform: translateX(5px) scale(1.02);
    }

    /* ==================== MAIN CONTENT ==================== */
    .main-content {
      margin-left: 280px;
      width: calc(100% - 280px);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      min-height: 100vh;
    }

    /* ==================== HEADER ==================== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 60px 50px;
      text-align: center;
      border-radius: 25px;
      margin-bottom: 50px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 1000px;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: moveGrid 20s linear infinite;
    }

    @keyframes moveGrid {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .header-content {
      position: relative;
      z-index: 2;
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 12px;
      font-weight: 800;
      text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .header p {
      font-size: 18px;
      opacity: 0.95;
      font-weight: 300;
    }

    /* ==================== TAB CONTENT ==================== */
    .tab-content {
      display: none;
      animation: fadeIn 0.5s ease-out;
      width: 100%;
      max-width: 1000px;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==================== CARD ==================== */
    .card {
      background: rgba(255, 255, 255, 0.97);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      border: 2px solid rgba(102, 126, 234, 0.1);
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
      width: 100%;
      transform: translateY(0);
    }

    .card:hover {
      box-shadow: 0 25px 70px rgba(102, 126, 234, 0.2);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateY(-3px);
    }

    .card h3 {
      color: #667eea;
      margin-bottom: 25px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    /* ==================== INPUT & TEXTAREA ==================== */
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.15), 0 0 20px rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    input::placeholder, textarea::placeholder {
      color: #999;
    }

    /* ==================== BUTTON ==================== */
    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
    }

    button:active {
      transform: translateY(-1px);
    }

    .logout {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%) !important;
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3) !important;
      margin-top: 40px !important;
      width: 100%;
      max-width: 1000px;
    }

    .logout:hover {
      box-shadow: 0 12px 35px rgba(255, 107, 107, 0.5) !important;
    }

    /* ==================== CONTENT BOX ==================== */
    .content-box {
      background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
      padding: 24px;
      margin: 18px 0;
      border-radius: 16px;
      border-left: 5px solid #667eea;
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
    }

    .content-box:hover {
      transform: translateX(-5px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.2);
    }

    .content-box h4 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .content-box p {
      color: #666;
      margin: 8px 0;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ==================== SCROLL BUTTONS ==================== */
    #scrollTopBtn, #scrollBottomBtn {
      position: fixed;
      right: 30px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 26px;
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
      z-index: 100;
    }

    #scrollTopBtn {
      bottom: 130px;
    }

    #scrollBottomBtn {
      bottom: 70px;
    }

    #scrollTopBtn:hover, #scrollBottomBtn:hover {
      transform: scale(1.12);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.6);
    }

    /* ==================== STATUS MESSAGE ==================== */
    .status-message {
      padding: 15px 20px;
      border-radius: 10px;
      margin: 15px 0;
      font-weight: 600;
      text-align: center;
      animation: slideIn 0.3s ease-out;
    }

    .status-success {
      background: #d4edda;
      color: #155724;
      border: 2px solid #28a745;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }

    .status-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 2px solid #bee5eb;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 1024px) {
    .main-content {
  margin-left: 0;
  width: 100%;
}
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        left: -280px;
        transition: left 0.3s ease;
        width: 280px;
        z-index: 200;
      }

      .sidebar.open {
        left: 0;
      }

      .main-content {
        margin-left: 0;
      }

      .header {
        padding: 40px 30px;
      }

      .header h1 {
        font-size: 36px;
      }
    }

    @media (max-width: 768px) {
      .main-content {
        padding: 20px 15px;
      }

      .card {
        padding: 20px;
      }

      .header h1 {
        font-size: 28px;
      }

      .header {
        padding: 30px 20px;
      }

      .sidebar {
        width: 100%;
        left: -100%;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ==================== ANIMATIONS ==================== */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    button:active {
      animation: pulse 0.5s ease-out;
    }
    #menuToggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 300;
  background: #667eea;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 20px;
  display: none;
}
    @media (max-width: 1024px) {
  #menuToggle {
    display: block;
  }
}
  </style>
</head>

<script>
  // فتح التبويب مع تحديث الأزرار
  function openTab(tabName, button) {
    // إخفاء جميع التبويبات
    let tabs = document.querySelectorAll(".tab-content")
    tabs.forEach(tab => tab.classList.remove("active"))

    // إزالة active من جميع الأزرار
    let buttons = document.querySelectorAll(".menu-btn")
    buttons.forEach(btn => btn.classList.remove("active"))

    // فتح التبويب المختار
    let selectedTab = document.getElementById(tabName)
    if (selectedTab) {
      selectedTab.classList.add("active")

      // إضافة active للزر
      if (button) {
        button.classList.add("active")
      }

      // تحميل المحتوى عند فتح تبويب المحتوى
      if (tabName === 'content') {
        loadTeacherContent()
      }
    }
  }

  // Scroll functions
  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }

  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })
  }

  // تحميل البروفايل والتواصل عند الدخول
  document.addEventListener("DOMContentLoaded", function() {
    loadCurrentProfile()
    loadCurrentSocial()
  })
</script>
