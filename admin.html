<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 48px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .stat-box h3 {
      color: #667eea;
      font-size: 48px;
    }

    .menu {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .menu-btn {
      padding: 15px 35px;
      background: white;
      border: 3px solid #667eea;
      border-radius: 15px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
      transition: all 0.3s ease;
    }

    .menu-btn:hover {
      background: #667eea;
      color: white;
    }

    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .card h3 {
      color: #667eea;
      margin-bottom: 25px;
    }

    input, select {
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button:not(.menu-btn) {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }

    button.danger {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
    }

    .user-card {
      background: #f5f7ff;
      padding: 20px;
      margin: 15px 0;
      border-radius: 15px;
    }

    .user-card h4 {
      color: #667eea;
    }

    .user-card button {
      width: auto;
      padding: 8px 16px;
      margin: 5px;
    }

    .select-row {
      display: none;
    }

    .logout {
      margin-top: 30px;
    }

    #search {
      margin-bottom: 20px;
    }

    #scrollTopBtn, #scrollBottomBtn {
      position: fixed;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      z-index: 100;
    }

    #scrollTopBtn { bottom: 120px; }
    #scrollBottomBtn { bottom: 60px; }

    @media (max-width: 768px) {
      .header h1 { font-size: 32px; }
      .card { padding: 20px; }
      .menu { flex-direction: column; }
      .menu-btn { width: 100%; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>👑 لوحة الأدمن</h1>
  <p>مرحباً بك في لوحة التحكم الرئيسية</p>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-box">
      <div style="font-size: 40px;">👥</div>
      <h3 id="totalUsers">0</h3>
      <p>إجمالي المستخدمين</p>
    </div>
    <div class="stat-box">
      <div style="font-size: 40px;">👨‍🏫</div>
      <h3 id="teachersCount">0</h3>
      <p>المدرسين</p>
    </div>
    <div class="stat-box">
      <div style="font-size: 40px;">👨‍🎓</div>
      <h3 id="studentsCount">0</h3>
      <p>الطلاب</p>
    </div>
  </div>

  <div class="menu">
    <button class="menu-btn" onclick="openTab('addUserTab')">➕ إضافة مستخدم جديد</button>
    <button class="menu-btn" onclick="openTab('usersTab')">👥 إدارة المستخدمين</button>
    <button class="menu-btn" onclick="openTab('loginLogsTab')">📋 سجل الدخول</button>
  </div>

  <div id="addUserTab" class="tab-content active">
    <div class="card">
      <h3>➕ إضافة مستخدم جديد</h3>
      <input type="text" id="name" placeholder="👤 اسم المستخدم">
      <input type="email" id="userEmail" placeholder="📧 البريد الإلكتروني">
      <div style="position: relative;">
        <input type="password" id="userPass" placeholder="🔒 كلمة المرور">
        <span onclick="togglePass()" style="position: absolute; left: 15px; top: 18px; cursor: pointer;">👁️</span>
      </div>
      <select id="role" onchange="onRoleChange()">
        <option value="">اختر الدور</option>
        <option value="teacher">👨‍🏫 مدرس</option>
        <option value="student">👨‍🎓 طالب</option>
      </select>
      <div id="teacherSelectRow" class="select-row">
        <select id="teacherSelect"><option value="">اختر المدرس</option></select>
      </div>
      <div id="stageSelectRow" class="select-row">
        <select id="stageSelect"><option value="">اختر المرحلة الدراسية</option></select>
      </div>
      <button onclick="addUser()">✅ إضافة المستخدم</button>
    </div>
  </div>

  <div id="usersTab" class="tab-content">
    <div class="card">
      <h3>👥 إدارة المستخدمين</h3>
      <input type="text" id="search" placeholder="🔍 ابحث عن مستخدم...">
      <div id="users"></div>
    </div>
  </div>

  <div id="loginLogsTab" class="tab-content">
    <div class="card">
      <h3>📋 سجل الدخول</h3>
      <div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="filterLogs('all')" style="width:auto; padding:10px 20px; background:#667eea;">الكل</button>
        <button onclick="filterLogs('student')" style="width:auto; padding:10px 20px; background:#25d366;">الطلاب</button>
        <button onclick="filterLogs('teacher')" style="width:auto; padding:10px 20px; background:#ffc107;">المدرسين</button>
      </div>
      <div id="loginLogsContainer">
        <p style="text-align:center; color:#999;">جاري تحميل السجلات...</p>
      </div>
    </div>
  </div>

  <button class="logout" onclick="logout()">🚪 تسجيل الخروج</button>
</div>

<button id="scrollTopBtn" onclick="scrollToTop()">⬆️</button>
<button id="scrollBottomBtn" onclick="scrollToBottom()">⬇️</button>

<script type="module" src="js/app.js"></script>
<script>
  // Helper functions for admin page
  window.openTab = function(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
    document.getElementById(id).classList.add('active')
  }

  window.scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' })
  window.scrollToBottom = () => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })
</script>
</body>
</html>
