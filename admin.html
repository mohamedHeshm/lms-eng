<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الأدمن</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard">
<div class="container">

  <h2>👑 لوحة الأدمن</h2>

  <!-- إحصائيات -->
  <div class="stats">
    <div class="stat-box">
      <h3 id="totalUsers">0</h3>
      <p>👥 المستخدمين</p>
    </div>
    <div class="stat-box">
      <h3 id="teachersCount">0</h3>
      <p>👨‍🏫 المدرسين</p>
    </div>
    <div class="stat-box">
      <h3 id="studentsCount">0</h3>
      <p>👨‍🎓 الطلاب</p>
    </div>
  </div>

  <!-- التاب -->
  <div class="tabs">
    <button onclick="window.openTab('addUserTab')">➕ إضافة مستخدم</button>
    <button onclick="window.openTab('usersTab')">👥 إدارة المستخدمين</button>
  </div>

  <!-- إضافة مستخدم -->
  <div id="addUserTab" class="tab-content">
    <div class="card">
      <h3>➕ إضافة مستخدم جديد</h3>

      <input type="text" id="name" placeholder="اسم المستخدم">
      <input type="email" id="userEmail" placeholder="البريد الإلكتروني">

      <div style="position:relative;">
        <input type="password" id="userPass" placeholder="كلمة السر">
        <span onclick="window.togglePass()" style="position:absolute; left:10px; top:12px; cursor:pointer; font-size:18px;">👁️</span>
      </div>

      <select id="role" onchange="window.onRoleChange()">
        <option value="teacher">مدرس</option>
        <option value="student">طالب</option>
      </select>

      <!-- اختيار المدرس -->
      <div id="teacherSelectRow" style="display:none;">
        <label style="display:block; margin-bottom:8px; font-weight:600;">اختر المدرس:</label>
        <select id="teacherSelect"></select>
      </div>

      <button onclick="window.addUser()" style="width:100%; margin-top:15px;">✅ إضافة المستخدم</button>
    </div>
  </div>

  <!-- إدارة المستخدمين -->
  <div id="usersTab" class="tab-content">
    <div class="card">
      <h3>👥 إدارة المستخدمين</h3>
      <input type="text" id="search" placeholder="🔍 ابحث عن مستخدم..." oninput="window.searchUsers()" style="margin-bottom:15px;">
      <div id="users"></div>
    </div>
  </div>

  <button class="logout" onclick="window.logout()">تسجيل خروج</button>
</div>

<script type="module" src="js/app.js"></script>

<button id="scrollTopBtn" onclick="window.scrollToTop()">⬆</button>
<button id="scrollBottomBtn" onclick="window.scrollToBottom()">⬇</button>

</body>
</html>
