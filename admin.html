<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
      overflow-x: hidden;
    }

    /* ==================== HEADER ==================== */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 50px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: moveGrid 20s linear infinite;
    }

    @keyframes moveGrid {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .header-content {
      position: relative;
      z-index: 2;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      font-weight: 700;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
    }

    .header p {
      font-size: 18px;
      opacity: 0.95;
    }

    /* ==================== CONTAINER ==================== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* ==================== STATS ==================== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      transform: translateY(0);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .stat-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .stat-box:hover {
      transform: translateY(-15px);
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
      border-color: #667eea;
    }

    .stat-box:hover::before {
      left: 100%;
    }

    .stat-box h3 {
      color: #667eea;
      font-size: 48px;
      margin: 15px 0;
      font-weight: 700;
    }

    .stat-box p {
      color: #666;
      font-size: 16px;
      font-weight: 500;
    }

    /* ==================== MENU ==================== */
    .menu {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-btn {
      padding: 15px 35px;
      background: white;
      border: 3px solid #667eea;
      border-radius: 15px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #667eea;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      font-family: 'Cairo', sans-serif;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: #667eea;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      z-index: -1;
    }

    .menu-btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .menu-btn:hover {
      color: white;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    /* ==================== TAB CONTENT ==================== */
    .tab-content {
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==================== CARD ==================== */
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      border: 2px solid rgba(102, 126, 234, 0.1);
      transition: all 0.4s ease;
    }

    .card:hover {
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.2);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .card h3 {
      color: #667eea;
      margin-bottom: 25px;
      font-size: 24px;
    }

    /* ==================== INPUT & SELECT ==================== */
    input, select {
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      box-sizing: border-box;
      font-size: 16px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    input::placeholder {
      color: #999;
    }

    /* ==================== BUTTON ==================== */
    button:not(.menu-btn) {
      width: 100%;
      padding: 15px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
      position: relative;
      overflow: hidden;
    }

    button:not(.menu-btn)::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    button:not(.menu-btn):hover::before {
      left: 100%;
    }

    button:not(.menu-btn):hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
    }

    button:not(.menu-btn):active {
      transform: translateY(-1px);
    }

    button.danger {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
    }

    button.danger:hover {
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.5);
    }

    .logout {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%) !important;
      margin-top: 30px;
      width: 100%;
    }

    /* ==================== USER CARD ==================== */
    .user-card {
      background: linear-gradient(135deg, #f5f7ff 0%, #f0f4ff 100%);
      padding: 20px;
      margin: 15px 0;
      border-radius: 15px;
      border: 2px solid #e0e8ff;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .user-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 5px;
      height: 100%;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
    }

    .user-card:hover {
      transform: translateX(-5px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
    }

    .user-card h4 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .user-card p {
      color: #666;
      margin: 5px 0;
      font-size: 14px;
    }

    .user-card button {
      width: auto;
      padding: 8px 16px;
      margin: 8px 5px 8px 0;
      font-size: 14px;
      display: inline-block;
    }

    /* ==================== SEARCH ==================== */
    #search {
      margin-bottom: 25px;
      font-size: 16px;
    }

    /* ==================== SELECT ROW ==================== */
    .select-row {
      display: none;
    }

    /* ==================== SCROLL BUTTONS ==================== */
    #scrollTopBtn, #scrollBottomBtn {
      position: fixed;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      transition: all 0.3s ease;
      z-index: 100;
    }

    #scrollTopBtn {
      bottom: 120px;
    }

    #scrollBottomBtn {
      bottom: 60px;
    }

    #scrollTopBtn:hover, #scrollBottomBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 32px;
      }

      .card {
        padding: 20px;
      }

      .menu {
        flex-direction: column;
      }

      .menu-btn {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    /* ==================== ANIMATIONS ==================== */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .stat-box h3 {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-content">
    <h1>👑 لوحة الأدمن</h1>
    <p>مرحباً بك في لوحة التحكم الرئيسية</p>
  </div>
</div>

<!-- CONTAINER -->
<div class="container">
  <!-- STATS -->
  <div class="stats">
    <div class="stat-box">
      <div style="font-size: 40px;">👥</div>
      <h3 id="totalUsers">0</h3>
      <p>إجمالي المستخدمين</p>
    </div>
    <div class="stat-box">
      <div style="font-size: 40px;">👨‍🏫</div>
      <h3 id="teachersCount">0</h3>
      <p>المدرسين</p>
    </div>
    <div class="stat-box">
      <div style="font-size: 40px;">👨‍🎓</div>
      <h3 id="studentsCount">0</h3>
      <p>الطلاب</p>
    </div>
  </div>

  <!-- MENU -->
  <div class="menu">
    <button class="menu-btn" onclick="openTab('addUserTab')">➕ إضافة مستخدم جديد</button>
    <button class="menu-btn" onclick="openTab('usersTab')">👥 إدارة المستخدمين</button>
    <button class="menu-btn" onclick="openTab('loginLogsTab')">📋 سجل الدخول</button>
  </div>

  <!-- ADD USER TAB -->
  <div id="addUserTab" class="tab-content active">
    <div class="card">
      <h3>➕ إضافة مستخدم جديد</h3>

      <input type="text" id="name" placeholder="👤 اسم المستخدم">
      <input type="email" id="userEmail" placeholder="📧 البريد الإلكتروني">

      <div style="position: relative;">
        <input type="password" id="userPass" placeholder="🔒 كلمة المرور">
        <span onclick="togglePass()" style="position: absolute; left: 15px; top: 18px; cursor: pointer; font-size: 20px;">👁️</span>
      </div>

      <select id="role" onchange="onRoleChange()">
        <option value="">اختر الدور</option>
        <option value="teacher">👨‍🏫 مدرس</option>
        <option value="student">👨‍🎓 طالب</option>
      </select>

      <!-- Teacher Select -->
      <div id="teacherSelectRow" class="select-row">
        <select id="teacherSelect">
          <option value="">اختر المدرس</option>
        </select>
      </div>

      <!-- Stage Select -->
      <div id="stageSelectRow" class="select-row">
        <select id="stageSelect">
          <option value="">اختر المرحلة الدراسية</option>
        </select>
      </div>

      <button onclick="addUser()">✅ إضافة المستخدم</button>
    </div>
  </div>

  <!-- USERS TAB -->
  <div id="usersTab" class="tab-content">
    <div class="card">
      <h3>👥 إدارة المستخدمين</h3>
      <input type="text" id="search" placeholder="🔍 ابحث عن مستخدم...">
      <div id="users"></div>
    </div>
  </div>

  <!-- LOGIN LOGS TAB -->
  <div id="loginLogsTab" class="tab-content">
    <div class="card">
      <h3>📋 سجل الدخول</h3>
      <div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="filterLogs('all')" style="width:auto; padding:10px 20px; background:#667eea;">الكل</button>
        <button onclick="filterLogs('student')" style="width:auto; padding:10px 20px; background:#25d366;">الطلاب</button>
        <button onclick="filterLogs('teacher')" style="width:auto; padding:10px 20px; background:#ffc107;">المدرسين</button>
      </div>
      <div id="loginLogsContainer">
        <p style="text-align:center; color:#999;">جاري تحميل السجلات...</p>
      </div>
    </div>
  </div>

  <!-- LOGOUT BUTTON -->
  <button class="logout" onclick="logout()">🚪 تسجيل الخروج</button>
</div>

<!-- SCROLL BUTTONS -->
<button id="scrollTopBtn" onclick="scrollToTop()">⬆️</button>
<button id="scrollBottomBtn" onclick="scrollToBottom()">⬇️</button>

<script src="js/app.js"></script>

</body>
</html>
