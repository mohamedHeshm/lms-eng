<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Ma'moun - نظام إدارة التعليم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --accent: #f093fb;
      --dark: #1a1a2e;
      --light: #f5f7fa;
      --text: #333;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ==================== HEADER ==================== */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 80px;
      animation: slideDown 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 1;
    }

    .header-content {
      position: relative;
    }

    .logo {
      font-size: 4.5rem;
      margin-bottom: 20px;
      animation: bounce 2s ease-in-out infinite;
    }

    .header h1 {
      font-size: 3.8rem;
      font-weight: 900;
      margin-bottom: 15px;
      text-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, #f0f0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 1.4rem;
      opacity: 0.95;
      font-weight: 300;
      margin-bottom: 30px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .header-divider {
      width: 150px;
      height: 4px;
      background: linear-gradient(90deg, transparent, white, transparent);
      margin: 0 auto 40px;
      animation: expandWidth 1s ease-out 0.3s both;
    }

    .stats-summary {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .summary-item {
      text-align: center;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    .summary-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin-bottom: 8px;
    }

    .summary-label {
      font-size: 1rem;
      opacity: 0.9;
      font-weight: 500;
    }

    /* ==================== TABS ==================== */
    .tabs-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 50px;
      animation: fadeInUp 0.8s ease-out 0.5s both;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 12px 28px;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Cairo', sans-serif;
    }

    .tab-btn:hover,
    .tab-btn.active {
      background: white;
      color: var(--secondary);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    /* ==================== TEACHERS GRID ==================== */
    .teachers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 40px;
      margin-bottom: 80px;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    .teacher-card {
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.6s ease-out;
    }

    .teacher-card:hover {
      transform: translateY(-20px);
      box-shadow: 0 40px 80px rgba(102, 126, 234, 0.3);
    }

    /* CARD HEADER */
    .card-header {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    .card-header::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.1), transparent);
      bottom: -50px;
      right: -50px;
      border-radius: 50%;
    }

    .teacher-image {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid white;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      z-index: 2;
      transition: all 0.4s ease;
    }

    .teacher-card:hover .teacher-image {
      transform: translateX(-50%) scale(1.1);
    }

    /* CARD BODY */
    .card-body {
      padding: 110px 30px 30px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .teacher-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .teacher-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0 auto 15px;
      text-align: center;
    }

    .teacher-bio {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 20px;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* STATS */
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px 0;
      border-top: 1px solid #f0f0f0;
      border-bottom: 1px solid #f0f0f0;
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.75rem;
      color: #999;
      margin-top: 4px;
      font-weight: 600;
    }

    /* SOCIAL LINKS */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .social-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      background: white;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      font-size: 1.2rem;
      border: 2px solid transparent;
    }

    .social-icon.facebook { border-color: #1877f2; }
    .social-icon.whatsapp { border-color: #25d366; }
    .social-icon.youtube { border-color: #ff0000; }

    .social-icon:hover {
      transform: translateY(-12px) scale(1.25) rotate(10deg);
      box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
    }

    .social-icon.facebook:hover { background: #1877f2; color: white; }
    .social-icon.whatsapp:hover { background: #25d366; color: white; }
    .social-icon.youtube:hover { background: #ff0000; color: white; }

    /* BUTTONS */
    .card-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Cairo', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    /* ==================== LOADING ==================== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .loading-text {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .empty-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .empty-subtext {
      opacity: 0.85;
      font-size: 1rem;
    }

    /* ==================== FOOTER ==================== */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: white;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 60px;
    }

    .footer p {
      margin: 5px 0;
      font-weight: 300;
    }

    /* ==================== ANIMATIONS ==================== */
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }

    @keyframes expandWidth {
      from {
        width: 0;
      }
      to {
        width: 150px;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 1200px) {
      .teachers-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
      }
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 2.5rem;
      }

      .header-subtitle {
        font-size: 1.1rem;
      }

      .logo {
        font-size: 3rem;
      }

      .stats-summary {
        gap: 30px;
      }

      .teachers-grid {
        grid-template-columns: 1fr;
      }

      .card-stats {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .tab-btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .header h1 {
        font-size: 1.8rem;
      }

      .header-subtitle {
        font-size: 1rem;
      }

      .summary-number {
        font-size: 1.8rem;
      }

      .card-body {
        padding: 100px 20px 20px;
      }

      .teacher-name {
        font-size: 1.3rem;
      }

      .card-buttons {
        flex-direction: column;
      }

      .btn {
        padding: 10px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- ==================== HEADER ==================== -->
  <div class="header">
    <div class="header-content">
      <div class="logo">🎓</div>
      <h1>Al-Ma'moun</h1>
      <p class="header-subtitle">نظام إدارة التعليم الإلكتروني المتقدم</p>
      <div class="header-divider"></div>

      <div class="stats-summary">
        <div class="summary-item">
          <div class="summary-number" id="totalUsers">0</div>
          <div class="summary-label">مستخدم</div>
        </div>
        <div class="summary-item">
          <div class="summary-number" id="totalTeachers">0</div>
          <div class="summary-label">معلم متميز</div>
        </div>
        <div class="summary-item">
          <div class="summary-number" id="totalStudents">0</div>
          <div class="summary-label">طالب نشط</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== TABS ==================== -->
  <div class="tabs-container">
    <button class="tab-btn active" onclick="window.filterTeachers('all', this)">👥 جميع المعلمين</button>
    <button class="tab-btn" onclick="window.filterTeachers('top', this)">⭐ الأفضل تقييماً</button>
    <button class="tab-btn" onclick="window.filterTeachers('new', this)">🆕 الجدد</button>
  </div>

  <!-- ==================== TEACHERS CONTAINER ==================== -->
  <div id="teachersContainer" class="teachers-grid">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">⏳ جاري تحميل المعلمين...</div>
    </div>
  </div>

  <!-- ==================== FOOTER ==================== -->
  <div class="footer">
    <p>💡 منصة تعليمية موثوقة وآمنة</p>
    <p>جميع الحقوق محفوظة © 2026 | طورها مهندس محمد هشام 👨🏻‍💻</p>
  </div>
</div>

<!-- ==================== SUPABASE ==================== -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = "https://dfxkuppxywldxsbyzfzo.supabase.co"
  const supabaseKey = "sb_publishable_B3xVoCtEJtpStm76kM5KDw_WZgPsJXN"
  const supabase = createClient(supabaseUrl, supabaseKey)

  let allTeachers = []
  let currentFilter = 'all'

  // تحميل جميع البيانات
  async function loadData() {
    try {
      // تحميل الإحصائيات
      let { data: users } = await supabase.from("users").select("role")
      if (users) {
        let teachers = users.filter(u => u.role === "teacher").length
        let students = users.filter(u => u.role === "student").length

        animateNumber("totalUsers", users.length)
        animateNumber("totalTeachers", teachers)
        animateNumber("totalStudents", students)
      }

      // تحميل المعلمين
      await loadTeachers()

    } catch (error) {
      console.error("Error:", error)
    }
  }

  // تحميل المعلمين
  async function loadTeachers() {
    try {
      let { data: teachers } = await supabase
        .from("users")
        .select("id, name, created_at")
        .eq("role", "teacher")

      if (!teachers) {
        showEmpty()
        return
      }

      allTeachers = []

      // تحميل بيانات كل معلم بشكل متوازي
      const profilesPromises = teachers.map(teacher =>
        Promise.all([
          supabase.from("teacher_profile").select("*").eq("teacher_id", teacher.id),
          supabase.from("social_links").select("*").eq("teacher_id", teacher.id),
          supabase.from("users").select("id").eq("teacher_id", teacher.id),
          getTeacherRating(teacher.id)
        ]).then(([profile, social, students, rating]) => ({
          id: teacher.id,
          name: teacher.name,
          created_at: teacher.created_at,
          profile: profile?.[0] || {},
          social: social?.[0] || {},
          students: students?.length || 0,
          rating: rating
        }))
      )

      allTeachers = await Promise.all(profilesPromises)
      displayTeachers('all')

    } catch (error) {
      console.error("Error loading teachers:", error)
    }
  }

  // عرض المعلمين
  function displayTeachers(filter) {
    currentFilter = filter
    let container = document.getElementById("teachersContainer")

    if (allTeachers.length === 0) {
      showEmpty()
      return
    }

    let filtered = allTeachers
    if (filter === 'new') {
      filtered = [...allTeachers].sort((a, b) =>
        new Date(b.created_at) - new Date(a.created_at)
      ).slice(0, 6)
    }

    container.innerHTML = ""

    filtered.forEach((teacher, i) => {
      let card = createTeacherCard(teacher, i)
      container.appendChild(card)
    })

    if (filtered.length === 0) {
      showEmpty()
    }
  }

  // إنشاء بطاقة المعلم
  function createTeacherCard(teacher, index) {
    let card = document.createElement('div')
    card.className = 'teacher-card'
    card.style.animationDelay = `${index * 0.05}s`

    let socialLinks = ""
    if (teacher.social?.facebook) {
      socialLinks += `<a href="${teacher.social.facebook}" target="_blank" class="social-icon facebook" title="فيسبوك">📘</a>`
    }
    if (teacher.social?.whatsapp) {
      socialLinks += `<a href="${teacher.social.whatsapp}" target="_blank" class="social-icon whatsapp" title="واتساب">💬</a>`
    }
    if (teacher.social?.youtube) {
      socialLinks += `<a href="${teacher.social.youtube}" target="_blank" class="social-icon youtube" title="يوتيوب">▶️</a>`
    }

    let imageUrl = teacher.profile?.image_url || 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop'
    let bio = teacher.profile?.bio || "معلم متخصص في التعليم الإلكتروني"

    card.innerHTML = `
      <div class="card-header">
        <img src="${imageUrl}" alt="${teacher.name}" class="teacher-image">
      </div>
      <div class="card-body">
        <h3 class="teacher-name">${teacher.name}</h3>
        <div class="teacher-badge">🌟 معلم متميز</div>
        <p class="teacher-bio">${bio}</p>

        <div class="card-stats">
          <div class="stat">
            <div class="stat-number">${teacher.students}</div>
            <div class="stat-label">طالب</div>
          </div>
          <div class="stat">
            <div class="stat-number">${teacher.rating}</div>
            <div class="stat-label">تقييم</div>
          </div>
          <div class="stat">
            <div class="stat-number">12</div>
            <div class="stat-label">دورة</div>
          </div>
        </div>

        <div class="social-links">
          ${socialLinks || '<p style="color:#ccc; font-size:0.9rem; text-align:center;">لم يتم إضافة روابط تواصل</p>'}
        </div>

        <div class="card-buttons">
          <button class="btn btn-primary" onclick="window.viewTeacherProfile('${teacher.id}')">👤 عرض البروفايل</button>
          <button class="btn btn-secondary" onclick="window.goToLogin()">🔐 دخول</button>
        </div>
      </div>
    `

    return card
  }

  // حساب التقييم العام للمدرس
  async function getTeacherRating(teacherId) {
    try {
      const { data: comments } = await supabase
        .from('teacher_comments')
        .select('rating')
        .eq('teacher_id', teacherId)

      if (!comments || comments.length === 0) return 4.8

      let avg = comments.reduce((sum, c) => sum + (c.rating || 0), 0) / comments.length
      return parseFloat(avg.toFixed(1))
    } catch (error) {
      return 4.8
    }
  }

  // عرض الحالة الفارغة
  function showEmpty() {
    let container = document.getElementById("teachersContainer")
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-text">لا توجد معلمين حالياً</div>
        <div class="empty-subtext">سيتم إضافة معلمين قريباً...</div>
      </div>
    `
  }

  // animate أرقام
  function animateNumber(id, final) {
    let el = document.getElementById(id)
    if (!el) return

    let current = 0
    let increment = Math.ceil(final / 50)
    let interval = setInterval(() => {
      current += increment
      if (current >= final) {
        el.innerText = final
        clearInterval(interval)
      } else {
        el.innerText = current
      }
    }, 20)
  }

  // Navigation
  window.filterTeachers = function(filter, button) {
    let buttons = document.querySelectorAll('.tab-btn')
    buttons.forEach(btn => btn.classList.remove('active'))
    if (button) button.classList.add('active')
    displayTeachers(filter)
  }

  window.viewTeacherProfile = function(teacherId) {
    if (!teacherId) {
      alert("❌ خطأ: لم يتم تحديد معلم")
      return
    }
    localStorage.setItem("selectedTeacherId", teacherId)
    window.location.href = `teacher-profile.html?id=${teacherId}`
  }

  window.goToLogin = function() {
    window.location.href = "index.html"
  }

  // تحميل البيانات عند فتح الصفحة
  window.addEventListener("load", loadData)

  // تحديث البيانات كل 30 ثانية
  setInterval(loadData, 30000)
</script>
</body>
</html>
