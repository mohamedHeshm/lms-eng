<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Ma'moun LMS - المنصة التعليمية الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a0f3f 50%, #2d1b4e 100%);
      min-height: 100vh;
      color: #fff;
    }

    /* Header */
    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 15, 30, 0.5);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-btn {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Playlists Section */
    .playlists-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 40px;
    }

    .playlists-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .playlist-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .playlist-card:hover {
      transform: translateY(-10px);
      background: rgba(255, 255, 255, 0.15);
    }

    .playlist-card h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #a8c0ff;
    }

    .teacher-name {
      color: #ccc;
      margin-bottom: 10px;
    }

    .playlist-price {
      color: #25d366;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .videos-count {
      color: #999;
      margin-bottom: 20px;
    }

    .btn-view {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn-view:hover {
      transform: scale(1.02);
    }

    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 15px;
      }
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎓 Al-Ma'moun</div>
  <button class="login-btn" onclick="window.location.href='index.html'">🔐 تسجيل الدخول</button>
</header>

<section class="hero">
  <h1>اكتشف قوائم التشغيل</h1>
  <p>اختر قائمة التشغيل المناسبة لك وابدأ التعلم</p>
</section>

<section class="playlists-section">
  <h2 class="section-title">🎬 قوائم التشغيل المتاحة</h2>
  <div id="playlistsContainer" class="playlists-grid">
    <p style="text-align:center; width:100%;">جاري التحميل...</p>
  </div>
</section>

<footer>
  <p>© 2026 Al-Ma'moun Educational Platform | جميع الحقوق محفوظة</p>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
