<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض قائمة التشغيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Cairo', sans-serif;
          background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
          min-height: 100vh;
          padding: 20px;
        }

        .container {
          max-width: 1000px;
          margin: 0 auto;
        }

        .back-btn {
          display: inline-block;
          margin-bottom: 20px;
          padding: 10px 25px;
          background: rgba(255,255,255,0.2);
          border: none;
          border-radius: 25px;
          color: white;
          cursor: pointer;
          font-family: 'Cairo', sans-serif;
          transition: all 0.3s ease;
        }

        .back-btn:hover {
          background: rgba(255,255,255,0.3);
          transform: translateX(-5px);
        }

        .playlist-header {
          background: rgba(255,255,255,0.1);
          backdrop-filter: blur(20px);
          border-radius: 30px;
          padding: 40px;
          text-align: center;
          margin-bottom: 30px;
        }

        .playlist-header h1 {
          font-size: 2rem;
          margin-bottom: 15px;
          color: #a8c0ff;
        }

        .price-tag {
          display: inline-block;
          background: #25d366;
          padding: 8px 20px;
          border-radius: 30px;
          margin-top: 10px;
          font-weight: bold;
        }

        .video-item {
          background: rgba(255,255,255,0.08);
          border-radius: 20px;
          padding: 20px;
          margin-bottom: 20px;
        }

        .video-item h4 {
          margin-bottom: 15px;
          color: #a8c0ff;
        }

        .video-wrapper {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          border-radius: 15px;
        }

        .video-wrapper iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
        }

        .protected-message {
          text-align: center;
          background: rgba(102,126,234,0.2);
          padding: 60px 20px;
          border-radius: 30px;
          margin: 20px 0;
        }

        .protected-message h3 {
          margin-bottom: 15px;
          color: #a8c0ff;
        }

        .login-btn {
          background: linear-gradient(135deg, #667eea, #764ba2);
          padding: 12px 30px;
          border: none;
          border-radius: 30px;
          color: white;
          font-weight: bold;
          cursor: pointer;
          margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="window.location.href='dashboard-home.html'">← رجوع للرئيسية</button>

    <div class="playlist-header">
        <h1 id="playlistTitle">...</h1>
        <p id="playlistTeacher">👨‍🏫 جاري التحميل...</p>
        <div id="playlistPrice" class="price-tag">💰 ...</div>
    </div>

    <div id="playlistVideos"></div>
</div>

<script type="module" src="js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof window.loadSinglePlaylist === 'function') {
        window.loadSinglePlaylist()
      }
    })
</script>
</body>
</html>
