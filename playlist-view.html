<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض قائمة التشغيل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'Cairo', sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
        }

        .container {
          max-width: 900px;
          margin: 0 auto;
        }

        .header {
          background: white;
          border-radius: 20px;
          padding: 30px;
          text-align: center;
          margin-bottom: 30px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
          color: #667eea;
          font-size: 2rem;
        }

        .video-item {
          background: white;
          border-radius: 15px;
          padding: 20px;
          margin-bottom: 20px;
          box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .video-item h4 {
          color: #333;
          margin-bottom: 15px;
        }

        .video-wrapper {
          position: relative;
          padding-bottom: 56.25%;
          height: 0;
          overflow: hidden;
          border-radius: 12px;
        }

        .video-wrapper iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border: none;
        }

        .back-link {
          display: inline-block;
          margin-bottom: 20px;
          color: white;
          text-decoration: none;
          background: rgba(255,255,255,0.2);
          padding: 10px 20px;
          border-radius: 10px;
        }

        .price-tag {
          background: #25d366;
          color: white;
          padding: 8px 16px;
          border-radius: 20px;
          display: inline-block;
          margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="dashboard-home.html" class="back-link">← رجوع إلى الرئيسية</a>

    <div class="header">
        <h1 id="playlistTitle">...</h1>
        <p id="playlistTeacher">👨‍🏫 المدرس: ...</p>
        <p id="playlistPrice" class="price-tag">💰 ...</p>
    </div>

    <div id="playlistVideos"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
